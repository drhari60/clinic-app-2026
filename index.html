<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Clinic | Smart Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #004d40; --accent: #00c853; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        input, textarea, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; padding: 15px; }
        .header { background: var(--primary); color: white; padding: 20px 15px; text-align: center; border-radius: 0 0 25px 25px; }
        .social-bar { display: flex; justify-content: center; gap: 15px; margin-top: 12px; }
        .social-bar a { color: white; font-size: 18px; text-decoration: none; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .tabs { display: flex; background: white; margin: -20px auto 20px; max-width: 90%; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; position: relative; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: white; cursor: pointer; color: #666; font-weight: bold; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #e0f2f1; }
        .qr-section { text-align: center; background: #fff; padding: 15px; border: 2px solid var(--primary); border-radius: 15px; margin: 15px 0; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body>

<div id="loginArea" class="card no-print" style="max-width: 400px; margin: 80px auto; text-align:center;">
    <h2 style="color: var(--primary);">Dr. Haris Clinic</h2>
    <input type="password" id="adminPass" placeholder="পাছৱৰ্ড দিয়ক">
    <div style="display:flex; gap:10px;">
        <button class="btn-primary" onclick="checkPass()">LOGIN</button>
        <button class="btn-primary" style="background:#555;" onclick="showBookingForm()">BOOK NOW</button>
    </div>
</div>

<div id="bookingForm" class="container no-print" style="max-width: 500px; margin: 20px auto; display:none;">
    <div class="card">
        <h2 style="text-align:center; color: var(--primary);">অনলাইন বুকিং</h2>
        <div class="qr-section">
            <p><b>Scan to Pay ₹100</b></p>
            <a href="upi://pay?pa=9954340102@okbizaxis&pn=Haris%20Homoeo%20Hall&am=100&cu=INR">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9954340102@okbizaxis%26pn=Haris%20Homoeo%20Hall%26am=100" alt="GPay QR">
            </a>
            <p><b>Haris Homoeo Hall</b></p>
        </div>
        <input type="text" id="bName" placeholder="ৰোগীৰ নাম">
        <input type="text" id="bPhone" placeholder="মোবাইল নম্বৰ">
        <textarea id="bProblem" placeholder="সমস্যাটো চমুকৈ লিখক..."></textarea>
        <input type="text" id="bTxn" placeholder="Transaction ID (পেমেন্টৰ পাছত)">
        <button class="btn-primary" style="background:var(--accent);" onclick="submitBooking()">CONFIRM BOOKING</button>
        <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="header no-print">
        <h1>Dr. Haris Clinic</h1>
        <div class="social-bar">
            <a href="https://www.facebook.com/drhari365" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@drhari" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://drhariswellfuture.com/" target="_blank"><i class="fas fa-globe"></i></a>
        </div>
    </div>

    <div class="container no-print" style="max-width: 800px; margin: auto; padding: 0 15px;">
        <div class="tabs">
            <button id="btn-rx" class="tab-btn active" onclick="switchTab('rx')">Rx/ৰোগী</button>
            <button id="btn-booking" class="tab-btn" onclick="switchTab('booking')">বুকিং</button>
            <button id="btn-acc" class="tab-btn" onclick="switchTab('acc')">হিচাপ</button>
            <button class="tab-btn" onclick="location.reload()" style="color:red;">LOGOUT</button>
        </div>

        <div id="section-rx">
            <div class="card" style="border-bottom: 3px solid var(--primary);">
                <input type="text" id="searchBox" placeholder="🔍 নাম বা নম্বৰ দি বিচাৰক..." onkeyup="filterPatients()" style="padding: 15px; border: 2px solid var(--primary);">
            </div>

            <button onclick="window.scrollTo({ top: document.getElementById('newEntryForm').offsetTop - 20, behavior: 'smooth' })" 
                    style="background: #e67e22; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; margin: 15px 0; font-weight: bold; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                ➕ নতুন ৰোগী লিখক (Direct to Form)
            </button>

            <div id="listPatients"></div>

            <hr style="margin: 20px 0;">

            <div class="card" id="newEntryForm">
                <h3 style="margin-top:0; color: var(--primary);">New Entry</h3>
                <input type="text" id="pName" placeholder="ৰোগীৰ নাম">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="pAgeSex" placeholder="বয়স/লিংগ">
                    <input type="text" id="pBP" placeholder="BP">
                </div>
                <input type="text" id="pPhone" placeholder="মোবাইল নম্বৰ">
                <textarea id="pHistory" placeholder="Patient History (ৰোগীৰ পুৰণা ৰোগ)"></textarea>
                <textarea id="pMedicine" placeholder="Rx (ঔষধসমূহ)"></textarea>
                <input type="number" id="pFees" placeholder="Fees (₹)">
                <button class="btn-primary" onclick="addPatient()">SAVE Rx</button>
            </div>
        </div>

        <div id="section-booking" style="display:none;">
            <h3>শেহতীয়া অনলাইন বুকিংসমূহ</h3>
            <div id="listBookings"></div>
        </div>

        <div id="section-acc" style="display:none;">
            <div class="card" style="display:flex; justify-content:space-between; background:var(--primary); color:white; text-align:center;">
                <div>উপাৰ্জন (Income)<br><b id="totalInc">0</b></div>
                <div>খৰচ (Expense)<br><b id="totalExp">0</b></div>
            </div>
            <div class="card">
                <h3>খৰচৰ এন্ট্ৰি (Expense Entry)</h3>
                <select id="accCategory">
                    <option value="Salary">Salary (দৰমহা)</option>
                    <option value="Light Bill">Light Bill (বিদ্যুতৰ বিল)</option>
                    <option value="House Rent">House Rent (ঘৰ ভাড়া)</option>
                    <option value="Others">Others (অন্যান্য)</option>
                </select>
                <input type="number" id="accAmount" placeholder="Amount (₹)">
                <input type="text" id="accNote" placeholder="Note (কিহৰ খৰচ?)">
                <button class="btn-primary" onclick="addAccount('Expense')">SAVE EXPENSE</button>
            </div>
            <div id="expenseList"></div>
        </div>
    </div>
</div>

<div id="printArea" class="print-only" style="padding:50px;"></div>

<script>
    const supabaseUrl = 'https://oblvgjnyecvvnnnesegl.supabase.co';
    const supabaseKey = 'sb_publishable_ekuwTZtgiCXsGRBWJXqYzQ_T8xUYjF9';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    function sendReminder(p) {
        const text = `নমস্কাৰ ${p.name} ডাঙৰীয়া/আইদেউ, 
ড° হৰি ক্লিনিকৰ পৰা আপোনাক মনত পেলাই দিয়া হৈছে যে আপোনাৰ ঔষধ খোৱাৰ সময় হৈছে। সুস্থ থাকক, সময়মতে ঔষধ খাওক।
---
পৰামৰ্শৰ বাবে যোগাযোগ কৰক: 9707722511`;
        
        window.open(`https://wa.me/91${p.phone}?text=${encodeURIComponent(text)}`);
    }

    function checkPass() {
        if(document.getElementById('adminPass').value === 'drharis1') {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadPatients(); loadAccounts(); loadBookings();
        } else { alert("ভুল পাছৱৰ্ড!"); }
    }

    async function addPatient() {
        const fees = parseInt(document.getElementById('pFees').value) || 0;
        const name = document.getElementById('pName').value;
        const d = { 
            name: name, age: document.getElementById('pAgeSex').value, 
            bp: document.getElementById('pBP').value, phone: document.getElementById('pPhone').value, 
            history: document.getElementById('pHistory').value, medicine: document.getElementById('pMedicine').value, fees: fees 
        };
        const { error } = await _supabase.from('clinic_data').insert([d]);
        if(!error) {
            if(fees > 0) await _supabase.from('clinic_accounts').insert([{ type: 'Income', amount: fees, note: 'ৰোগী: ' + name }]);
            alert("Saved!"); location.reload();
        }
    }

    function printPrescription(p) {
        document.getElementById('printArea').innerHTML = `
            <div style="text-align:center;"><h2>DR. HARIS HOMEOPATHIC CLINIC</h2><p>গোগামুখ, ধেমাজি | ফোন: 9707722511</p><hr></div>
            <div style="display:flex; justify-content:space-between; margin:15px 0;">
                <div><b>ৰোগী:</b> ${p.name}</div><div><b>বয়স/লিংग:</b> ${p.age}</div><div><b>BP:</b> ${p.bp}</div>
            </div>
            <p><b>History:</b> ${p.history || 'N/A'}</p><hr>
            <h3>Rx:</h3><div style="min-height:400px; font-size:18px;">${p.medicine.replace(/\n/g, '<br>')}</div><hr>
            <div style="text-align:right;"><p>_________________</p><p>Signature</p></div>`;
        window.print();
    }

    function sendWhatsApp(p) {
        const clinicLinks = `---
🔗 *Follow us for Health Tips:*
📘 Facebook: https://www.facebook.com/drhari365
📺 YouTube: https://www.youtube.com/@drhari
🌐 Website: https://drhariswellfuture.com/`;

        const text = `*Dr. Haris Clinic Prescription*%0A%0A*Patient:* ${p.name}%0A*History:* ${p.history || 'N/A'}%0A*Rx (Medicines):*%0A${p.medicine}%0A%0A${encodeURIComponent(clinicLinks)}`;
        window.open(`https://wa.me/91${p.phone}?text=${text}`);
    }

    async function addAccount(type) {
    const amt = parseInt(document.getElementById('accAmount').value);
    const cat = document.getElementById('accCategory').value;
    const note = document.getElementById('accNote').value;
    if(!amt) return;

    if(currentEditAccountId) {
        // যদি কোনো খৰচ এডিট হৈ আছে, তেন্তে পুৰণা ডাটা আপডেট হ'ব
        const { error } = await _supabase.from('clinic_accounts').update({ amount: amt, note: `${cat}: ${note}` }).eq('id', currentEditAccountId);
        if(!error) {
            alert("খৰচৰ হিচাপ শুধৰোৱা হ’ল!");
            currentEditAccountId = null; 
        } else {
            alert("আপডেট কৰাত কিবা ভুল হৈছে।");
        }
    } else {
        // নহলে স্বাভাৱিক দৰেই নতুন খৰচৰ এন্ট্ৰি হ'ব
        const { error } = await _supabase.from('clinic_accounts').insert([{ type: type, amount: amt, note: `${cat}: ${note}` }]);
        if(!error) alert("খৰচ চেভ কৰা হ'ল!");
    }
    location.reload();
}

    function switchTab(t) {
        document.getElementById('section-rx').style.display = t==='rx'?'block':'none';
        document.getElementById('section-booking').style.display = t==='booking'?'block':'none';
        document.getElementById('section-acc').style.display = t==='acc'?'block':'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + t).classList.add('active');
    }

    async function loadPatients() {
        const { data } = await _supabase.from('clinic_data').select('*').order('created_at', { ascending: false });
        if(data) document.getElementById('listPatients').innerHTML = data.map(p => `
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: start;">
                    <div>
                        <b style="font-size: 1.1em; color: var(--primary);">${p.name}</b><br>
                        <small style="color: #666;">📞 ${p.phone}</small>
                    </div>
                </div>
                <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
                    <button onclick='printPrescription(${JSON.stringify(p)})' style="flex:1; background:#555; color:white; padding:8px; border:none; border-radius:8px; cursor:pointer; font-size:12px;">
                        <i class="fas fa-print"></i> Print
                    </button>
                    <button onclick='sendWhatsApp(${JSON.stringify(p)})' style="flex:1; background:#25d366; color:white; padding:8px; border:none; border-radius:8px; cursor:pointer; font-size:12px;">
                        <i class="fab fa-whatsapp"></i> Rx
                    </button>
                    <button onclick='sendReminder(${JSON.stringify(p)})' style="flex:1; background:#ff9800; color:white; padding:8px; border:none; border-radius:8px; cursor:pointer; font-size:12px;">
                        <i class="fas fa-bell"></i> Remind
                    </button>
                </div>
            </div>`).join('');
    }

    async function loadBookings() {
        const { data } = await _supabase.from('clinic_bookings').select('*').order('created_at', { ascending: false });
        if(data) document.getElementById('listBookings').innerHTML = data.map(b => `<div class="card"><b>${b.name}</b> (${b.phone})<br>Txn ID: ${b.txn_id}</div>`).join('');
    }

   let currentEditAccountId = null; // কোনটো একাউণ্ট এডিট হৈছে মনত ৰাখিবলৈ

async function loadAccounts() {
    const { data } = await _supabase.from('clinic_accounts').select('*').order('created_at', { ascending: false });
    if(data) {
        let i=0, e=0; data.forEach(d => d.type==='Income'?i+=d.amount:e+=d.amount);
        document.getElementById('totalInc').innerText = '₹'+i; document.getElementById('totalExp').innerText = '₹'+e;
        
        // ইয়াত এতিয়া Edit আৰু Delete দুয়োটাই কাম কৰিব
        document.getElementById('expenseList').innerHTML = "<h4>খৰচৰ তালিকা:</h4>" + data.filter(d => d.type === 'Expense').map(d => `
            <div style="font-size:14px; border-bottom:1px solid #eee; padding:10px 5px; display:flex; justify-content:space-between; align-items:center;">
                <span>${new Date(d.created_at).toLocaleDateString()}: ${d.note} - ₹${d.amount}</span>
                <div style="display:flex; gap:8px;">
                    <button onclick='editAccountInline(${JSON.stringify(d)})' style="width:auto; margin:0; padding:6px 10px; background:#3498db; color:white; border:none; border-radius:5px; font-size:12px; cursor:pointer;"><i class="fas fa-edit"></i> Edit</button>
                    <button onclick="deleteAccount(${d.id})" style="width:auto; margin:0; padding:6px 10px; background:#e74c3c; color:white; border:none; border-radius:5px; font-size:12px; cursor:pointer;"><i class="fas fa-trash-alt"></i> Mosi Diya</button>
                </div>
            </div>`).join('');
    }
}

// এডিট বুটাম টিপিলে পুৰণা ডাটা খৰচৰ ফৰ্মত গৈ বহিব
function editAccountInline(d) {
    currentEditAccountId = d.id;
    const parts = d.note.split(': ');
    const noteContent = parts.length > 1 ? parts.slice(1).join(': ') : d.note;
    
    document.getElementById('accAmount').value = d.amount;
    document.getElementById('accNote').value = noteContent;
    
    // বুটামৰ নাম সলনি হ'ব
    const btn = document.querySelector("#section-acc .btn-primary");
    btn.innerText = "UPDATE EXPENSE";
    btn.style.background = "#e67e22";
    
    // স্ক্ৰীল কৰি এন্ট্ৰি ফৰ্মলৈ লৈ যাব
    document.getElementById('accCategory').scrollIntoView({behavior: 'smooth'});
}

// এইটো নতুন ডিলিট ফাংচন
async function deleteAccount(id) {
    if(confirm("আপুনি নিশ্চিতনে যে এই খৰচটো তালিকাৰ পৰা মচি দিব খোজে?")) {
        const { error } = await _supabase.from('clinic_accounts').delete().eq('id', id);
        if(!error) { alert("মচি দিয়া হ’ল!"); location.reload(); }
        else { alert("ভুল হৈছে, আকৌ চেষ্টা কৰক।"); }
    }
}

    function filterPatients() {
        const term = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('#listPatients .card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none');
    }
    
    function showBookingForm() { document.getElementById('loginArea').style.display = 'none'; document.getElementById('bookingForm').style.display = 'block'; }
    
    async function submitBooking() {
    const name = document.getElementById('bName').value;
    const phone = document.getElementById('bPhone').value;
    const problem = document.getElementById('bProblem').value;
    const txn = document.getElementById('bTxn').value;

    // ১. প্ৰথমে চেক কৰিব নাম আৰু ফোন নম্বৰ লিখিছে নে নাই
    if(!name || !phone) {
        alert("অনুগ্ৰহ কৰি প্ৰথমে আপোনাৰ নাম আৰু মোবাইল নম্বৰ লিখক।");
        return;
    }

    // ২. যদি Transaction ID লিখা নাই, তেন্তে পোনপটীয়াকৈ পেমেন্ট কৰিবলৈ ক'ব
    if(!txn) {
        alert("প্ৰথমে ₹100 পেমেন্ট কৰক। তাৰপিছতহে Transaction ID দি কনফৰ্ম কৰিব পাৰিব।");
        
        // পেমেন্ট লিংক (পোনপটীয়াকৈ পেমেন্ট এপ খোল খাব)
        const upiUrl = `upi://pay?pa=9954340102@okbizaxis&pn=Haris%20Homoeo%20Hall&am=100&cu=INR&tn=Booking_for_${name}`;
        window.location.href = upiUrl;
        return; 
    }

    // ৩. যদি Transaction ID লিখা হৈ গৈছে, তেতিয়া ডাটাবেচত চেভ হ'ব
    const d = { name, phone, problem, txn_id: txn };
    const { error } = await _supabase.from('clinic_bookings').insert([d]);
    
    if(!error) { 
        alert("ধন্যবাদ! আপোনাৰ বুকিং সফল হৈছে। আমি অতি সোনকালে যোগাযোগ কৰিম।"); 
        location.reload(); 
    } else {
        alert("কিবা ভুল হৈছে, অনুগ্ৰহ কৰি পুনৰ চেষ্টা কৰক।");
    }
}
</script>
</body>
</html>
