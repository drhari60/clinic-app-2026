<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Clinic | Secure Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .doctor-img { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-24">

    <div class="clinic-profile bg-white text-center py-6 px-4 rounded-b-3xl shadow-sm no-print">
        <img src="doctor.jpg.jpeg" alt="Dr. Harikanta Das" class="doctor-img mx-auto mb-3" id="doctorPhoto">
        <h2 class="text-2xl font-extrabold text-gray-900">Dr. Harikanta Das</h2>
        <p class="text-sm font-medium text-gray-500">Homeopathic Physician & Physiotherapist</p>
        <h1 class="text-3xl font-black text-green-800 mt-2">Dr. Haris Clinic</h1>
    </div>

    <div id="loginSection" class="max-w-md mx-auto mt-8 p-6 bg-white rounded-2xl shadow-md no-print">
        <h3 class="text-xl font-bold text-center mb-4 text-gray-700">ক্লিনিক ষ্টাফ লগইন</h3>
        <input type="email" id="loginEmail" placeholder="ইমেইল (Email)" class="w-full p-3 mb-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700">
        <input type="password" id="loginPassword" placeholder="পাছৱৰ্ড (Password)" class="w-full p-3 mb-4 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-700">
        <div class="flex gap-3">
            <button id="btnStaffLogin" class="w-1/2 bg-green-800 text-white p-3 rounded-xl font-bold hover:bg-green-900 transition">LOGIN</button>
            <button id="btnPatientBooking" class="w-1/2 bg-gray-600 text-white p-3 rounded-xl font-bold hover:bg-gray-700 transition">BOOK NOW</button>
        </div>
    </div>

    <div id="appDashboard" class="hidden max-w-4xl mx-auto px-4 mt-6 no-print">
        <div class="flex justify-around bg-white p-2 rounded-xl shadow-sm mb-6">
            <button class="tab-btn px-4 py-2 font-bold text-green-800 border-b-2 border-green-800" data-tab="home"><i class="fas fa-home"></i> Home</button>
            <button class="tab-btn px-4 py-2 font-bold text-gray-500" data-tab="bookings"><i class="fas fa-calendar-alt"></i> Bookings</button>
            <button class="tab-btn px-4 py-2 font-bold text-gray-500" data-tab="profile"><i class="fas fa-user-md"></i> Profile</button>
        </div>

        <div id="tab-home" class="tab-content">
            <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
                <input type="text" id="searchBox" placeholder="🔍 নাম বা নম্বৰ দি বিচাৰক..." class="w-full p-3 border-2 border-green-800 rounded-xl focus:outline-none">
            </div>
            <div id="listPatients" class="space-y-4 mb-6"></div>

            <div class="bg-white p-6 rounded-2xl shadow-md">
                <h3 class="text-lg font-bold text-green-800 mb-4" id="formTitle">নতুন ৰোগীৰ প্ৰেচক্ৰিপচন এন্ট্ৰি</h3>
                <input type="text" id="pName" placeholder="ৰোগীৰ নাম" class="w-full p-3 mb-3 border rounded-xl">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" id="pAgeSex" placeholder="বয়স/লিংগ" class="w-full p-3 border rounded-xl">
                    <input type="text" id="pBP" placeholder="Blood Pressure (BP)" class="w-full p-3 border rounded-xl">
                </div>
                <input type="text" id="pPhone" placeholder="মোবাইল নম্বৰ" class="w-full p-3 mb-3 border rounded-xl">
                <textarea id="pHistory" placeholder="Patient History (ৰোগীৰ পুৰণা ৰোগ)" class="w-full p-3 mb-3 border rounded-xl" rows="2"></textarea>
                <textarea id="pMedicine" placeholder="Rx (ঔষধসমূহ আৰু খোৱাৰ নিয়ম)" class="w-full p-3 mb-3 border rounded-xl" rows="4"></textarea>
                <input type="number" id="pFees" placeholder="Fees (₹)" class="w-full p-3 mb-4 border rounded-xl">
                <button id="btnSavePatient" class="w-full bg-green-800 text-white p-4 rounded-xl font-bold hover:bg-green-900 transition">SAVE PRESCRIPTION</button>
            </div>
        </div>

        <div id="tab-bookings" class="tab-content hidden">
            <div class="bg-white p-6 rounded-2xl shadow-md">
                <h3 class="text-xl font-bold text-gray-700 mb-4">অনলাইনৰ পৰা অহা বুকিংসমূহ</h3>
                <div id="listBookings" class="space-y-4"></div>
            </div>
        </div>

        <div id="tab-profile" class="tab-content hidden">
            <div class="bg-white p-6 rounded-2xl shadow-md text-center">
                <h3 class="text-xl font-bold text-red-600 mb-4">সুৰক্ষামূলক বাহিৰ হ’বলৈ</h3>
                <button id="btnLogout" class="w-full bg-red-600 text-white p-3 rounded-xl font-bold hover:bg-red-700 transition">LOGOUT</button>
            </div>
        </div>
    </div>

    <div id="publicBookingSection" class="hidden max-w-md mx-auto mt-6 p-6 bg-white rounded-2xl shadow-md no-print">
        <h3 class="text-xl font-bold text-center text-green-800 mb-4">অনলাইন এপইণ্টমেণ্ট বুকিং</h3>
        <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200 text-center mb-4">
            <p class="font-bold text-yellow-800">বুকিং ফীজ: ₹১০০</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9954340102@okbizaxis%26pn=Haris%20Homoeo%20Hall%26am=100" alt="UPI QR" class="mx-auto my-3 border p-1 bg-white rounded">
            <p class="text-xs text-gray-600 font-mono">UPI: 9954340102@okbizaxis</p>
        </div>
        <input type="text" id="bName" placeholder="ৰোগীৰ সম্পূৰ্ণ নাম" class="w-full p-3 mb-3 border rounded-xl">
        <input type="text" id="bPhone" placeholder="মোবাইল নম্বৰ" class="w-full p-3 mb-3 border rounded-xl">
        <textarea id="bProblem" placeholder="আপোনাৰ সমস্যাটো চমুকৈ লিখক..." class="w-full p-3 mb-3 border rounded-xl"></textarea>
        <input type="text" id="bTxnId" placeholder="* Transaction ID / UTR No" class="w-full p-3 mb-4 border-2 border-red-500 rounded-xl text-center font-bold">
        <button id="btnSubmitBooking" class="w-full bg-green-700 text-white p-3 rounded-xl font-bold">CONFIRM BOOKING</button>
        <button onclick="location.reload()" class="w-full text-gray-500 text-sm mt-3">Cancel</button>
    </div>

    <div id="printArea" class="print-only p-12"></div>

    <script src="app.js"></script>
</body>
</html>
