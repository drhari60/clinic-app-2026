<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Clinic | Pro System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #004d40; --accent: #00c853; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        input, textarea, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; padding: 15px; }
        .btn-pay { background: #e65100; color: white; border: none; font-weight: bold; cursor: pointer; padding: 12px; }
        .header { background: var(--primary); color: white; padding: 20px 15px; text-align: center; border-radius: 0 0 25px 25px; }
        .social-bar { display: flex; justify-content: center; gap: 15px; margin-top: 12px; flex-wrap: wrap; }
        .social-bar a { color: white; font-size: 18px; text-decoration: none; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .tabs { display: flex; background: white; margin-top: -20px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: white; cursor: pointer; color: #666; font-weight: bold; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #e0f2f1; }
        #qrModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; text-align: center; color: white; padding-top: 40px; }
        .qr-img { width: 85%; max-width: 320px; border-radius: 15px; border: 5px solid white; }
        #searchBox { border: 2px solid var(--primary); padding-left: 45px; height: 55px; font-size: 16px; }
        
        /* Print Styling */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; padding: 40px; border: 2px solid #000; }
            body { background: white; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>

<div id="qrModal" class="no-print">
    <div style="padding: 20px;">
        <h3>স্কেন কৰি পেমেন্ট কৰক</h3>
        <img src="https://raw.githubusercontent.com/DrHarisClinic/assets/main/qr.jpeg" class="qr-img" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi://pay?pa=9954340102@okbizaxis%26pn=Haris%20Homoeo%20Hall%26am=100'">
        <br><button onclick="closeQR()" style="margin-top:10px;">বন্ধ কৰক</button>
    </div>
</div>

<div id="mainApp" class="no-print">
    <div class="header">
        <h1 style="margin:0;">Dr. Haris Clinic</h1>
        <div class="social-bar">
            <a href="https://www.facebook.com/drhari365" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@drhari" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/drharikanta/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://drhariswellfuture.com/" target="_blank"><i class="fas fa-globe"></i></a>
            <a href="https://wa.me/919954340102" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <div class="container" style="max-width: 800px; margin: auto; padding: 0 15px;">
        <div id="adminTabs" class="tabs" style="display:none; margin-bottom: 20px;">
            <button id="btn-rx" class="tab-btn active" onclick="switchTab('rx')">Rx/ৰোগী</button>
            <button id="btn-book" class="tab-btn" onclick="switchTab('book')">বুকিং</button>
            <button id="btn-acc" class="tab-btn" onclick="switchTab('acc')">হিচাপ</button>
        </div>

        <div id="search-container" style="display:none; margin-top: 10px;">
            <input type="text" id="searchBox" placeholder="নাম বা ফোন নম্বৰ দি বিচাৰক..." onkeyup="filterPatients()">
        </div>

        <div id="section-rx" style="display:none;">
            <div class="card">
                <h3>New Patient Entry</h3>
                <input type="text" id="pName" placeholder="ৰোগীৰ নাম">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="pAgeSex" placeholder="বয়স/লিংগ">
                    <input type="text" id="pBP" placeholder="BP">
                </div>
                <input type="text" id="pPhone" placeholder="মোবাইল নম্বৰ">
                <textarea id="pHistory" placeholder="History"></textarea>
                <textarea id="pMedicine" placeholder="Prescription (Rx)"></textarea>
                <input type="number" id="pFees" placeholder="Fees (₹)">
                <button class="btn-primary" onclick="addPatient()">SAVE & SYNC</button>
            </div>
            <div id="listPatients"></div>
        </div>

        <div id="section-public-book" style="display:none;">
            <div class="card">
                <h3>অনলাইন বুকিং ফৰ্ম</h3>
                <input type="text" id="bName" placeholder="ৰোগীৰ নাম">
                <input type="text" id="bPhone" placeholder="মোবাইল নম্বৰ">
                <textarea id="bProblem" placeholder="সমস্যা লিখক"></textarea>
                <button class="btn-pay" onclick="showQR()">Pay Online (₹100)</button>
                <input type="text" id="bTxn" placeholder="Transaction ID">
                <button class="btn-primary" onclick="submitBooking()">CONFIRM BOOKING</button>
            </div>
        </div>

        <div id="section-acc" style="display:none;">
            <div class="card" style="display:flex; justify-content:space-between; text-align:center; background: var(--primary); color: white;">
                <div>উপাৰ্জন<br><b id="totalInc">0</b></div>
                <div>খৰচ<br><b id="totalExp">0</b></div>
                <div>লাভ<br><b id="totalNet">0</b></div>
            </div>
            <div class="card">
                <select id="accType"><option value="Income">Income</option><option value="Expense">Expense</option></select>
                <input type="number" id="accAmount" placeholder="Amount (₹)">
                <input type="text" id="accNote" placeholder="Note">
                <button class="btn-primary" onclick="addAccount()">SAVE RECORD</button>
            </div>
        </div>
    </div>
</div>

<div id="printArea" class="print-only"></div>

<script>
    const supabaseUrl = 'https://oblvgjnyecvvnnnesegl.supabase.co';
    const supabaseKey = 'sb_publishable_ekuwTZtgiCXsGRBWJXqYzQ_T8xUYjF9';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');

    window.onload = () => {
        if (mode === 'book') { document.getElementById('section-public-book').style.display = 'block'; }
        else { 
            document.getElementById('adminTabs').style.display = 'flex'; 
            document.getElementById('search-container').style.display = 'block';
            document.getElementById('section-rx').style.display = 'block'; 
            loadPatients(); loadAccounts(); 
        }
    };

    function showQR() { document.getElementById('qrModal').style.display = 'block'; }
    function closeQR() { document.getElementById('qrModal').style.display = 'none'; }

    async function addPatient() {
        const name = document.getElementById('pName').value;
        const fees = parseInt(document.getElementById('pFees').value) || 0;
        const d = { name: name, age: document.getElementById('pAgeSex').value, bp: document.getElementById('pBP').value, phone: document.getElementById('pPhone').value, history: document.getElementById('pHistory').value, medicine: document.getElementById('pMedicine').value, fees: fees };
        const { error } = await _supabase.from('clinic_data').insert([d]);
        if(!error) {
            if(fees > 0) await _supabase.from('clinic_accounts').insert([{ type: 'Income', amount: fees, note: 'Rx: ' + name }]);
            alert("Saved!"); location.reload();
        }
    }

    function sendWhatsApp(name, phone, medicine) {
        const msg = `*Dr. Haris Clinic*%0A*Patient:* ${name}%0A*Rx:* ${medicine}`;
        window.open(`https://wa.me/91${phone}?text=${msg}`);
    }

    function printPrescription(p) {
        const area = document.getElementById('printArea');
        area.innerHTML = `
            <div style="text-align:center;">
                <h1 style="margin:0;">DR. HARIS CLINIC</h1>
                <p>Gogamukh, Dhemaji, Assam | Phone: 9954340102</p>
                <hr>
            </div>
            <div style="display:flex; justify-content:space-between; margin: 20px 0;">
                <div><b>Name:</b> ${p.name}</div>
                <div><b>Age/Sex:</b> ${p.age || 'N/A'}</div>
                <div><b>BP:</b> ${p.bp || 'N/A'}</div>
            </div>
            <p><b>History:</b> ${p.history || 'None'}</p>
            <hr>
            <h3 style="text-decoration:underline;">Rx:</h3>
            <div style="min-height: 300px; font-size: 1.2em;">${p.medicine.replace(/\n/g, '<br>')}</div>
            <hr>
            <div style="text-align:right; margin-top: 30px;">
                <p>___________________</p>
                <p>Doctor's Signature</p>
            </div>
        `;
        window.print();
    }

    async function loadPatients() {
        const { data } = await _supabase.from('clinic_data').select('*').order('created_at', { ascending: false });
        document.getElementById('listPatients').innerHTML = data.map(p => `
            <div class="card">
                <b>${p.name}</b> (${p.age || ''})<br>
                <div style="margin:10px 0;">
                    <button onclick='printPrescription(${JSON.stringify(p)})' style="width:auto; background:#555; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;"><i class="fas fa-print"></i> Print</button>
                    <button onclick="sendWhatsApp('${p.name}', '${p.phone}', '${p.medicine}')" style="width:auto; background:#25D366; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                </div>
            </div>`).join('');
    }

    function filterPatients() {
        const term = document.getElementById('searchBox').value.toLowerCase();
        const cards = document.querySelectorAll('#listPatients .card');
        cards.forEach(c => { c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none'; });
    }

    function switchTab(t) {
        ['rx', 'book', 'acc'].forEach(s => {
            const el = document.getElementById('section-' + (s==='book'?'book-list':s));
            if(el) el.style.display = s===t?'block':'none';
            document.getElementById('btn-'+s).classList.toggle('active', s===t);
        });
    }

    async function loadAccounts() {
        const { data } = await _supabase.from('clinic_accounts').select('*');
        let i=0, e=0; data.forEach(d => d.type==='Income'?i+=d.amount:e+=d.amount);
        document.getElementById('totalInc').innerText = '₹'+i; document.getElementById('totalExp').innerText = '₹'+e; document.getElementById('totalNet').innerText = '₹'+(i-e);
    }

    async function addAccount() {
        const amount = parseInt(document.getElementById('accAmount').value);
        if(amount) {
            await _supabase.from('clinic_accounts').insert([{ type: document.getElementById('accType').value, amount, note: document.getElementById('accNote').value }]);
            location.reload();
        }
    }
</script>
</body>
</html>
