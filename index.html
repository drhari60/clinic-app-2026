<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Clinic | Smart Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #004d40; 
            --accent: #00c853; 
            --light: #f8fafb; 
            --white: #ffffff;
            --text: #2c3e50;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--light); 
            margin: 0; 
            padding-bottom: 90px; 
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .header { 
            background: linear-gradient(135deg, var(--primary), #00695c); 
            color: white; 
            padding: 40px 20px 60px; 
            text-align: center; 
            border-radius: 0 0 35px 35px;
            box-shadow: 0 4px 20px rgba(0,77,64,0.3);
        }

        .card { 
            background: var(--white); 
            border-radius: 24px; 
            padding: 25px; 
            box-shadow: var(--shadow); 
            margin: 15px; 
            border: 1px solid rgba(0,0,0,0.03);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, textarea, select { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 14px; 
            border: 1px solid #e0e0e0; 
            box-sizing: border-box; 
            background: #fdfdfd;
            font-size: 15px;
        }

        .btn-primary { 
            background: var(--primary); 
            color: white; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            padding: 16px; 
            border-radius: 16px;
            width: 100%;
            font-size: 16px;
            box-shadow: 0 8px 20px rgba(0,77,64,0.25);
            transition: all 0.3s ease;
        }

        .social-bar { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .social-bar a { color: white; background: rgba(255,255,255,0.15); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; }

        /* Modern Bottom Navbar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.06);
            border-radius: 25px 25px 0 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.3s ease;
            flex: 1;
        }

        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }

        .qr-section { text-align: center; border: 2px solid var(--primary); border-radius: 15px; padding: 10px; margin: 10px 0; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body>

<div id="loginArea" class="card no-print" style="max-width: 400px; margin: 80px auto; text-align:center;">
    <h2 style="color: var(--primary);">Dr. Haris Clinic</h2>
    <input type="password" id="adminPass" placeholder="পাছৱৰ্ড দিয়ক">
    <div style="display:flex; gap:10px;">
        <button class="btn-primary" onclick="checkPass()">LOGIN</button>
        <button class="btn-primary" style="background:#555;" onclick="showBookingForm()">BOOK NOW</button>
    </div>
</div>

<div id="bookingForm" style="display:none;">
    <div class="card" style="max-width: 500px; margin: 20px auto;">
        <h2 style="text-align:center; color: var(--primary);">অনলাইন বুকিং</h2>
        <div class="qr-section">
            <p><b>Scan to Pay ₹100</b></p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9954340102@okbizaxis%26pn=Haris%20Homoeo%20Hall%26am=100" style="width:150px;">
        </div>
        <input type="text" id="bName" placeholder="ৰোগীৰ নাম">
        <input type="text" id="bPhone" placeholder="মোবাইল নম্বৰ">
        <textarea id="bProblem" placeholder="সমস্যাটো চমুকৈ লিখক..."></textarea>
        <button class="btn-primary" style="background:var(--accent);" onclick="submitBooking()">CONFIRM BOOKING</button>
        <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer; width:100%; margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="header no-print">
        <h1>Dr. Haris Clinic</h1>
        <div class="social-bar">
            <a href="https://www.facebook.com/drhari365" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.youtube.com/@drhari" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://drhariswellfuture.com/" target="_blank"><i class="fas fa-globe"></i></a>
        </div>
    </div>

    <div id="section-home" class="tab-content">
        <div class="card" style="margin-top: -20px; position: relative; z-index: 5;">
            <input type="text" id="searchBox" placeholder="🔍 নাম বা নম্বৰ দি বিচাৰক..." onkeyup="filterPatients()">
        </div>
        <div id="listPatients"></div>
        
        <div class="card" id="newEntryForm">
            <h3 style="color: var(--primary); margin-top:0;">New Rx Entry</h3>
            <input type="text" id="pName" placeholder="ৰোগীৰ নাম">
            <div style="display:flex; gap:10px;">
                <input type="text" id="pAgeSex" placeholder="বয়স/লিংগ">
                <input type="text" id="pBP" placeholder="BP">
            </div>
            <input type="text" id="pPhone" placeholder="মোবাইল নম্বৰ">
            <textarea id="pHistory" placeholder="Patient History"></textarea>
            <textarea id="pMedicine" placeholder="Rx (ঔষধসমূহ)"></textarea>
            <input type="number" id="pFees" placeholder="Fees (₹)">
            <button class="btn-primary" onclick="addPatient()">SAVE Rx</button>
        </div>
    </div>

    <div id="section-bookings" class="tab-content" style="display:none;">
        <div class="card">
            <h3 style="color: var(--primary);">শেহতীয়া অনলাইন বুকিংসমূহ</h3>
            <div id="listBookings"></div>
        </div>
    </div>

    <div id="section-reports" class="tab-content" style="display:none;">
        <div class="card" style="display:flex; justify-content:space-between; background:var(--primary); color:white; text-align:center;">
            <div>উপাৰ্জন<br><b id="totalInc">0</b></div>
            <div>খৰচ<br><b id="totalExp">0</b></div>
        </div>
        <div class="card">
            <h3>Expense Entry</h3>
            <select id="accCategory">
                <option value="Salary">Salary</option>
                <option value="Light Bill">Light Bill</option>
                <option value="House Rent">House Rent</option>
                <option value="Others">Others</option>
            </select>
            <input type="number" id="accAmount" placeholder="Amount (₹)">
            <input type="text" id="accNote" placeholder="Note">
            <button class="btn-primary" onclick="addAccount('Expense')">SAVE EXPENSE</button>
        </div>
        <div id="expenseList"></div>
    </div>

    <div id="section-profile" class="tab-content" style="display:none;">
        <div class="card" style="text-align:center;">
            <i class="fas fa-user-circle" style="font-size:60px; color:var(--primary);"></i>
            <h2>Dr. Harikanta Das</h2>
            <p>Homeopathic Physician & Physiotherapist</p>
            <button class="btn-primary" style="background:#e74c3c;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

    <div class="bottom-nav no-print">
        <a href="javascript:void(0)" class="nav-item active" onclick="showTab('home')">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showTab('bookings')">
            <i class="fas fa-calendar-alt"></i><span>Bookings</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showTab('reports')">
            <i class="fas fa-chart-line"></i><span>Accounts</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showTab('profile')">
            <i class="fas fa-user-md"></i><span>Profile</span>
        </a>
    </div>
</div>

<div id="printArea" class="print-only"></div>

<div id="paymentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; padding:20px;">
    <div style="background:white; padding:20px; border-radius:15px; max-width:400px; width:100%; text-align:center;">
        <h3>পেমেন্ট কনফৰ্ম কৰক</h3>
        <input type="text" id="bTxnInput" placeholder="Transaction ID লিখক" style="border:2px solid var(--primary);">
        <button class="btn-primary" onclick="closePaymentModal()">CONFIRM BOOKING</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://oblvgjnyecvvnnnesegl.supabase.co';
    const supabaseKey = 'sb_publishable_ekuwTZtgiCXsGRBWJXqYzQ_T8xUYjF9';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    let currentEditPatientId = null;
    let currentEditAccountId = null;

    function checkPass() {
        if(document.getElementById('adminPass').value === 'drharis1') {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadPatients(); loadAccounts(); loadBookings();
        } else { alert("ভুল পাছৱৰ্ড!"); }
    }

    function showTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(div => div.style.display = 'none');
        document.getElementById('section-' + tabName).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    async function addPatient() {
        const name = document.getElementById('pName').value;
        const fees = parseInt(document.getElementById('pFees').value) || 0;
        if(!name) return alert("নাম লিখক!");
        
        const d = { 
            name, age: document.getElementById('pAgeSex').value, 
            bp: document.getElementById('pBP').value, phone: document.getElementById('pPhone').value,
            history: document.getElementById('pHistory').value, medicine: document.getElementById('pMedicine').value, fees
        };

        const { error } = currentEditPatientId ? 
            await _supabase.from('clinic_data').update(d).eq('id', currentEditPatientId) :
            await _supabase.from('clinic_data').insert([d]);

        if(!error) {
            if(fees > 0 && !currentEditPatientId) await _supabase.from('clinic_accounts').insert([{ type: 'Income', amount: fees, note: 'ৰোগী: ' + name }]);
            alert("Success!"); location.reload();
        }
    }

    async function loadPatients() {
        const { data } = await _supabase.from('clinic_data').select('*').order('created_at', { ascending: false });
        if(data) document.getElementById('listPatients').innerHTML = data.map(p => `
            <div class="card">
                <b>${p.name}</b> (${p.phone})
                <div style="margin-top:10px; display:flex; gap:5px;">
                    <button onclick='printPrescription(${JSON.stringify(p)})' style="padding:5px; flex:1;">Print</button>
                    <button onclick='sendWhatsApp(${JSON.stringify(p)})' style="padding:5px; flex:1; background:#25d366; color:white; border:none; border-radius:5px;">WA</button>
                    <button onclick='editPatientInline(${JSON.stringify(p)})' style="padding:5px; flex:1; background:#3498db; color:white; border:none; border-radius:5px;">Edit</button>
                </div>
            </div>`).join('');
    }

    function editPatientInline(p) {
        currentEditPatientId = p.id;
        document.getElementById('pName').value = p.name;
        document.getElementById('pAgeSex').value = p.age || '';
        document.getElementById('pPhone').value = p.phone;
        document.getElementById('pMedicine').value = p.medicine;
        document.getElementById('newEntryForm').scrollIntoView();
    }

    async function loadBookings() {
        const { data } = await _supabase.from('clinic_bookings').select('*').order('created_at', { ascending: false });
        if(data) document.getElementById('listBookings').innerHTML = data.map(b => `<div style="border-bottom:1px solid #eee; padding:10px;"><b>${b.name}</b><br>ID: ${b.txn_id}</div>`).join('');
    }

    async function loadAccounts() {
        const { data } = await _supabase.from('clinic_accounts').select('*');
        if(data) {
            let i=0, e=0; data.forEach(d => d.type==='Income'?i+=d.amount:e+=d.amount);
            document.getElementById('totalInc').innerText = '₹'+i;
            document.getElementById('totalExp').innerText = '₹'+e;
        }
    }

    async function addAccount(type) {
        const amt = parseInt(document.getElementById('accAmount').value);
        const note = document.getElementById('accNote').value;
        if(!amt) return;
        await _supabase.from('clinic_accounts').insert([{ type, amount: amt, note }]);
        location.reload();
    }

    function filterPatients() {
        const term = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('#listPatients .card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none');
    }

    function showBookingForm() { document.getElementById('loginArea').style.display = 'none'; document.getElementById('bookingForm').style.display = 'block'; }
    
    function printPrescription(p) {
        document.getElementById('printArea').innerHTML = `<div style="text-align:center;"><h2>DR. HARIS CLINIC</h2><hr><h3>Rx for ${p.name}</h3><p>${p.medicine.replace(/\n/g, '<br>')}</p></div>`;
        window.print();
    }

    function sendWhatsApp(p) {
        window.open(`https://wa.me/91${p.phone}?text=Dr. Haris Clinic Rx: ${encodeURIComponent(p.medicine)}`);
    }

    async function submitBooking() {
        const name = document.getElementById('bName').value;
        const phone = document.getElementById('bPhone').value;
        if(!name || !phone) return alert("Fill data!");
        window.temporaryBookingData = { name, phone, problem: document.getElementById('bProblem').value };
        document.getElementById('paymentModal').style.display = 'flex';
    }

    async function closePaymentModal() {
        const txn = document.getElementById('bTxnInput').value;
        if(!txn) return alert("Enter ID");
        const { error } = await _supabase.from('clinic_bookings').insert([{ ...window.temporaryBookingData, txn_id: txn }]);
        if(!error) { alert("Booked!"); location.reload(); }
    }
</script>
</body>
</html>
