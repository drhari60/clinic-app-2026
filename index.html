<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Smart Clinic v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="p-2 sm:p-6 pb-20">
    <div class="max-w-2xl mx-auto">
        <header class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg mb-6 text-center">
            <h1 class="text-3xl font-bold">DR. HARIS CLINIC</h1>
            <p class="opacity-75">Professional Management System</p>
        </header>

        <div class="flex mb-6 bg-white rounded-xl shadow-sm p-1 border overflow-x-auto">
            <button onclick="showTab('checkup')" id="tabCheck" class="flex-1 py-2 px-4 rounded-lg font-bold text-blue-700 bg-blue-50 whitespace-nowrap">১. ৰোগী পৰীক্ষা (Entry)</button>
            <button onclick="showTab('pharmacy')" id="tabPharma" class="flex-1 py-2 px-4 rounded-lg font-bold text-gray-500 whitespace-nowrap">২. ঔষধ আৰু বিল</button>
            <button onclick="showTab('accounts')" id="tabAcc" class="flex-1 py-2 px-4 rounded-lg font-bold text-gray-500 whitespace-nowrap">৩. জমা-খৰচ</button>
        </div>

        <div id="checkupSection" class="block">
            <div class="bg-white p-6 rounded-2xl shadow-md mb-6 border-t-4 border-blue-600">
                <h2 class="text-lg font-bold mb-4">ৰোগীৰ নাম আৰু ইতিহাস লিখক</h2>
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="pName" placeholder="ৰোগীৰ সম্পূৰ্ণ নাম" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                    <textarea id="pHistory" placeholder="বেমাৰৰ ইতিহাস / লক্ষণ (Symptoms)" class="border p-3 rounded-lg h-24 outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                    <button onclick="addPatient()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">ৰোগী যোগ কৰক (Save History)</button>
                </div>
            </div>
        </div>

        <div id="pharmacySection" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-md mb-6 border-t-4 border-green-500">
                <h2 class="text-lg font-bold mb-4">ঔষধ আৰু মাচুলৰ এন্ট্ৰি</h2>
                <div class="grid grid-cols-1 gap-3">
                    <select id="selectPatient" class="border p-3 rounded-lg outline-none bg-gray-50 font-bold text-blue-800">
                        <option value="">ৰোগী বাচি লওক (Select Patient)</option>
                    </select>
                    <input type="text" id="pMed" placeholder="কি ঔষধ দিলে? (Medicines)" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-green-400">
                    <input type="number" id="pFee" placeholder="মুঠ মাচুল (Amount ₹)" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-green-400">
                    <button onclick="finalizeBill()" class="bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition">বিল সম্পূৰ্ণ কৰক</button>
                </div>
            </div>
        </div>

        <div id="accountsSection" class="hidden">
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="bg-green-100 p-4 rounded-xl border border-green-200">
                    <p class="text-xs text-green-700 font-bold uppercase">মাহেকীয়া উপাৰ্জন</p>
                    <p id="monthlyIncome" class="text-2xl font-black text-green-800">₹ 0</p>
                </div>
                <div class="bg-red-100 p-4 rounded-xl border border-red-200">
                    <p class="text-xs text-red-700 font-bold uppercase">মাহেকীয়া খৰচ</p>
                    <p id="monthlyExp" class="text-2xl font-black text-red-800">₹ 0</p>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-md mb-6 border-t-4 border-red-400">
                <h3 class="font-bold mb-4">ক্লিনিকৰ খৰচ যোগ কৰক (Rent/Bill/Salary)</h3>
                <div class="flex flex-col gap-3">
                    <input type="text" id="expNote" placeholder="খৰচৰ ধৰণ (উদা: লাইট বিল)" class="border p-2 rounded-lg">
                    <input type="number" id="expAmount" placeholder="পৰিমাণ ₹" class="border p-2 rounded-lg">
                    <button onclick="addExpense()" class="bg-red-500 text-white font-bold py-2 rounded-lg">খৰচ যোগ কৰক</button>
                </div>
            </div>
        </div>

        <div id="mainDisplayList" class="space-y-4">
            </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('dr_hari_v2')) || { patients: [], expenses: [] };

        function showTab(tab) {
            document.getElementById('checkupSection').className = tab === 'checkup' ? 'block' : 'hidden';
            document.getElementById('pharmacySection').className = tab === 'pharmacy' ? 'block' : 'hidden';
            document.getElementById('accountsSection').className = tab === 'accounts' ? 'block' : 'hidden';
            
            // Tab visual update
            const tabs = { checkup: 'tabCheck', pharmacy: 'tabPharma', accounts: 'tabAcc' };
            Object.keys(tabs).forEach(k => {
                document.getElementById(tabs[k]).className = `flex-1 py-2 px-4 rounded-lg font-bold ${k === tab ? 'text-blue-700 bg-blue-50 shadow-sm' : 'text-gray-500'}`;
            });
            
            if(tab === 'pharmacy') loadPatientDropdown();
            updateUI(tab);
        }

        function addPatient() {
            const name = document.getElementById('pName').value;
            const history = document.getElementById('pHistory').value;
            if(!name) return alert('ৰোগীৰ নাম লিখক');
            db.patients.unshift({ name, history, medicine: '', fee: 0, date: new Date().toLocaleDateString('as-IN'), timestamp: new Date().getTime(), billed: false });
            document.getElementById('pName').value = ''; document.getElementById('pHistory').value = '';
            save(); updateUI('checkup');
        }

        function loadPatientDropdown() {
            const select = document.getElementById('selectPatient');
            select.innerHTML = '<option value="">ৰোগী বাচি লওক</option>';
            db.patients.filter(p => !p.billed).forEach((p, i) => {
                select.innerHTML += `<option value="${p.timestamp}">${p.name} (${p.date})</option>`;
            });
        }

        function finalizeBill() {
            const ts = document.getElementById('selectPatient').value;
            const med = document.getElementById('pMed').value;
            const fee = document.getElementById('pFee').value;
            if(!ts || !fee) return alert('ৰোগী আৰু মাচুল দুয়োটাই প্ৰয়োজন');
            
            const pIndex = db.patients.findIndex(p => p.timestamp == ts);
            db.patients[pIndex].medicine = med;
            db.patients[pIndex].fee = parseInt(fee);
            db.patients[pIndex].billed = true;
            
            document.getElementById('pMed').value = ''; document.getElementById('pFee').value = '';
            save(); showTab('pharmacy');
        }

        function addExpense() {
            const note = document.getElementById('expNote').value;
            const amt = document.getElementById('expAmount').value;
            if(!amt) return alert('পৰিমাণ দিয়ক');
            db.expenses.unshift({ note, amount: parseInt(amt), date: new Date().toLocaleDateString('as-IN'), month: new Date().getMonth() });
            document.getElementById('expNote').value = ''; document.getElementById('expAmount').value = '';
            save(); updateUI('accounts');
        }

        function updateUI(tab) {
            const list = document.getElementById('mainDisplayList');
            list.innerHTML = '';
            let inc = 0; let exp = 0;
            const currM = new Date().getMonth();

            if(tab === 'checkup') {
                db.patients.forEach((p, i) => {
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-400">
                        <div class="flex justify-between font-bold"><span>${p.name}</span><span class="text-xs text-gray-400">${p.date}</span></div>
                        <p class="text-sm text-gray-600 mt-1"><strong>History:</strong> ${p.history}</p>
                        ${p.billed ? `<p class="text-xs text-green-600 font-bold mt-2">✓ Bill Done: ₹${p.fee}</p>` : `<p class="text-xs text-orange-500 font-bold mt-2">! Pending Medicine/Bill</p>`}
                    </div>`;
                });
            } else if(tab === 'pharmacy') {
                db.patients.filter(p => p.billed).forEach(p => {
                    list.innerHTML += `<div class="bg-green-50 p-4 rounded-xl border border-green-100">
                        <div class="font-bold text-green-800">${p.name}</div>
                        <p class="text-sm text-gray-600">Med: ${p.medicine}</p>
                        <p class="font-bold text-green-700">Fee: ₹${p.fee}</p>
                    </div>`;
                });
            }

            db.patients.forEach(p => { if(new Date(p.timestamp).getMonth() === currM) inc += (p.fee || 0); });
            db.expenses.forEach(e => { if(e.month === currM) exp += e.amount; });
            document.getElementById('monthlyIncome').innerText = '₹ ' + inc;
            document.getElementById('monthlyExp').innerText = '₹ ' + exp;
        }

        function save() { localStorage.setItem('dr_hari_v2', JSON.stringify(db)); }
        updateUI('checkup');
    </script>
</body>
</html>
