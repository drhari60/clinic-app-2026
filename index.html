<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Clinic</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .premium-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 text-gray-800 antialiased min-h-screen py-4 sm:py-8 px-2">
    <div id="mainPatientSection" class="w-full max-w-md mx-auto glass-card shadow-2xl rounded-3xl overflow-hidden border border-white/40">
        <div class="premium-gradient p-5 sm:p-6 text-white text-center relative overflow-hidden">
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-white/5 rounded-full blur-xl"></div>
            <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight flex items-center justify-center gap-2">
                <i class="fas fa-heartbeat text-red-500 animate-pulse"></i> DR. HARIS CLINIC
            </h1>
            <p class="text-[11px] sm:text-xs text-slate-300 mt-1 font-medium tracking-wide uppercase">Homeopathy & Physiotherapy Care</p>
        </div>

        <div id="authContainer" class="p-5 border-b border-gray-100 bg-amber-50/50">
            <div class="flex items-center justify-between">
                <span id="authStatusText" class="text-xs font-bold text-amber-800 flex items-center gap-1.5">
                    <i class="fas fa-lock text-amber-600"></i> View Only Mode
                </span>
                <button id="btnToggleAuth" class="text-xs bg-slate-900 hover:bg-slate-800 text-white font-bold px-3 py-1.5 rounded-xl transition shadow-sm">
                    Doctor Login
                </button>
            </div>
            <div id="authForm" class="mt-3 hidden space-y-2 pt-3 border-t border-amber-200/50">
                <input type="password" id="doctorPin" placeholder="Enter Secure PIN" class="w-full p-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner">
                <button id="btnVerifyPin" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-xl text-xs shadow transition">Verify</button>
            </div>
        </div>

        <div class="flex border-b border-gray-200 bg-white sticky top-0 z-10 shadow-sm">
            <button class="tab-btn flex-1 py-3 text-xs font-bold border-b-2 border-slate-900 text-slate-900 tracking-wide transition flex items-center justify-center gap-1.5" data-tab="home">
                <i class="fas fa-user-injured"></i> Patients
            </button>
            <button class="tab-btn flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-gray-400 tracking-wide transition flex items-center justify-center gap-1.5" data-tab="add">
                <i class="fas fa-user-plus"></i> New Registration
            </button>
            <button class="tab-btn flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-gray-400 tracking-wide transition flex items-center justify-center gap-1.5" data-tab="expenses">
                <i class="fas fa-calculator"></i> Ledger / খৰচ
            </button>
        </div>

        <div class="p-4 sm:p-5">
            
            <div id="tab-home" class="tab-content space-y-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-3.5 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="searchBar" placeholder="ৰোগীৰ নাম বা ফোন নম্বৰ দি বিচাৰক..." class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-2xl text-xs bg-white focus:outline-none shadow-sm placeholder:text-gray-400">
                </div>
                <div id="patientList" class="space-y-3">
                    <div class="text-center py-8 text-gray-400 text-xs font-medium">তথ্য লোড হৈ আছে...</div>
                </div>
            </div>

            <div id="tab-add" class="tab-content hidden space-y-4">
                <div class="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-gray-100">
                    <h3 id="formTitle" class="text-sm font-bold text-gray-900 mb-4 border-b pb-2 flex items-center gap-1.5">
                        <i class="fas fa-id-card text-slate
