<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Hari's Clinic Khata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden mt-4">
        <header class="bg-blue-800 text-white p-6 text-center">
            <h1 class="text-2xl font-bold uppercase tracking-wider">Clinic Khata</h1>
            <p class="text-sm opacity-75">Dr. Harikanta Das</p>
        </header>

        <div class="p-6">
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="ৰোগীৰ নাম" class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-blue-500 outline-none transition">
                <input type="number" id="pFee" placeholder="মাচুল (₹)" class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-blue-500 outline-none transition">
                <button onclick="addEntry()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 active:scale-95 transition transform">যোগ কৰক (+)</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-blue-50 p-4 rounded-xl text-center border border-blue-100">
                    <p class="text-xs text-blue-600 uppercase font-bold tracking-tight">মুঠ ৰোগী</p>
                    <p id="totalPatients" class="text-2xl font-black text-blue-800">0</p>
                </div>
                <div class="bg-green-50 p-4 rounded-xl text-center border border-green-100">
                    <p class="text-xs text-green-600 uppercase font-bold tracking-tight">উপাৰ্জন</p>
                    <p id="totalEarnings" class="text-2xl font-black text-green-800">₹ 0</p>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="font-bold text-gray-700 mb-3 border-b pb-1">শেহতীয়া এন্ট্ৰি</h3>
                <div id="entriesList" class="space-y-3 max-h-60 overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let entries = JSON.parse(localStorage.getItem('clinic_data')) || [];
        function updateUI() {
            const list = document.getElementById('entriesList');
            list.innerHTML = '';
            let total = 0;
            entries.forEach((e, i) => {
                total += parseInt(e.fee);
                list.innerHTML += `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <div><p class="font-bold text-gray-800">${e.name}</p><p class="text-xs text-gray-400">${e.date}</p></div>
                    <div class="text-blue-700 font-bold">₹${e.fee}</div>
                </div>`;
            });
            document.getElementById('totalPatients').innerText = entries.length;
            document.getElementById('totalEarnings').innerText = '₹ ' + total;
            localStorage.setItem('clinic_data', JSON.stringify(entries));
        }
        function addEntry() {
            const name = document.getElementById('pName').value;
            const fee = document.getElementById('pFee').value;
            if(!name || !fee) return alert('সকলো তথ্য দিয়ক');
            entries.unshift({ name, fee, date: new Date().toLocaleDateString('as-IN') });
            document.getElementById('pName').value = '';
            document.getElementById('pFee').value = '';
            updateUI();
        }
        updateUI();
    </script>
</body>
</html>
