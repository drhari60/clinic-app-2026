<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Clinic</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .premium-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 text-gray-800 antialiased min-h-screen py-4 sm:py-8 px-2">
    <div id="mainPatientSection" class="w-full max-w-md mx-auto glass-card shadow-2xl rounded-3xl overflow-hidden border border-white/40">
        <div class="premium-gradient p-5 sm:p-6 text-white text-center relative overflow-hidden">
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-white/5 rounded-full blur-xl"></div>
            <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight flex items-center justify-center gap-2">
                <i class="fas fa-heartbeat text-red-500 animate-pulse"></i> DR. HARIS CLINIC
            </h1>
            <p class="text-[11px] sm:text-xs text-slate-300 mt-1 font-medium tracking-wide uppercase">Homeopathy & Physiotherapy Care</p>
        </div>

        <div id="authContainer" class="p-5 border-b border-gray-100 bg-amber-50/50">
            <div class="flex items-center justify-between">
                <span id="authStatusText" class="text-xs font-bold text-amber-800 flex items-center gap-1.5">
                    <i class="fas fa-lock text-amber-600"></i> View Only Mode
                </span>
                <button id="btnToggleAuth" class="text-xs bg-slate-900 hover:bg-slate-800 text-white font-bold px-3 py-1.5 rounded-xl transition shadow-sm">
                    Doctor Login
                </button>
            </div>
            <div id="authForm" class="mt-3 hidden space-y-2 pt-3 border-t border-amber-200/50">
                <input type="password" id="doctorPin" placeholder="Enter Secure PIN" class="w-full p-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner">
                <button id="btnVerifyPin" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-xl text-xs shadow transition">Verify</button>
            </div>
        </div>

        <div class="flex border-b border-gray-200 bg-white sticky top-0 z-10 shadow-sm">
            <button class="tab-btn flex-1 py-3 text-xs font-bold border-b-2 border-slate-900 text-slate-900 tracking-wide transition flex items-center justify-center gap-1.5" data-tab="home">
                <i class="fas fa-user-injured"></i> Patients
            </button>
            <button class="tab-btn flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-gray-400 tracking-wide transition flex items-center justify-center gap-1.5" data-tab="add">
                <i class="fas fa-user-plus"></i> New Registration
            </button>
            <button class="tab-btn flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-gray-400 tracking-wide transition flex items-center justify-center gap-1.5" data-tab="expenses">
                <i class="fas fa-calculator"></i> Ledger / খৰচ
            </button>
        </div>

        <div class="p-4 sm:p-5">
            
            <div id="tab-home" class="tab-content space-y-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-3.5 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="searchBar" placeholder="ৰোগীৰ নাম বা ফোন নম্বৰ দি বিচাৰক..." class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-2xl text-xs bg-white focus:outline-none shadow-sm placeholder:text-gray-400">
                </div>
                <div id="patientList" class="space-y-3">
                    <div class="text-center py-8 text-gray-400 text-xs font-medium">তথ্য লোড হৈ আছে...</div>
                </div>
            </div>

            <div id="tab-add" class="tab-content hidden space-y-4">
                <div class="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-gray-100">
                    <h3 id="formTitle" class="text-sm font-bold text-gray-900 mb-4 border-b pb-2 flex items-center gap-1.5">
                        <i class="fas fa-id-card text-slate-700"></i> নতুন ৰোগী পঞ্জীয়ন ফৰ্ম
                    </h3>
                    <form id="patientForm" class="space-y-3.5">
                        <input type="hidden" id="editId">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">ৰোগীৰ সম্পূৰ্ণ নাম</label>
                            <input type="text" id="pName" required placeholder="Name" class="w-full p-3 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">ফোন নম্বৰ</label>
                                <input type="tel" id="pPhone" placeholder="Phone" class="w-full p-3 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">বয়স আৰু লিংগ</label>
                                <input type="text" id="pAgeGender" placeholder="Age/Sex (e.g. 35/M)" class="w-full p-3 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">ঠিকনা</label>
                            <input type="text" id="pAddress" placeholder="Address" class="w-full p-3 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">প্ৰধান লক্ষণ / সমস্যা (Symptoms)</label>
                            <textarea id="pCase" rows="2" placeholder="Chief Complaints..." class="w-full p-3 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner resize-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">পৰামৰ্শ আৰু ঔষধ (Prescription)</label>
                            <textarea id="pRx" rows="3" placeholder="Medicines / Treatment / Advice..." class="w-full p-3 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner resize-none"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">ভিジット ফীজ (₹)</label>
                                <input type="number" id="pFees" placeholder="Fees Amount" class="w-full p-3 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">পৰৱৰ্তী ভিজিটৰ তাৰিখ</label>
                                <input type="date" id="pNextDate" class="w-full p-3 border border-gray-200 rounded-xl text-xs focus:outline-none shadow-inner text-gray-600">
                            </div>
                        </div>
                        <div class="pt-2 flex gap-2">
                            <button type="submit" id="btnSubmit" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl shadow-md transition text-xs tracking-wider uppercase">সংৰক্ষণ কৰক (Save)</button>
                            <button type="button" id="btnCancelEdit" class="hidden bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl transition text-xs">বাতিল কৰক</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="tab-expenses" class="tab-content hidden space-y-4">
                <div class="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-sm font-bold text-gray-900 mb-3 border-b pb-2 flex items-center gap-1.5"><i class="fas fa-plus-circle text-red-500"></i> নতুন দৈনিক খৰচৰ এণ্ট্ৰী</h3>
                    <div class="space-y-3">
                        <select id="expCategory" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 text-sm focus:outline-none">
                            <option value="Salary">দৰমহা (Salary)</option>
                            <option value="Rent">ঘৰ ভাড়া (Rent)</option>
                            <option value="Electricity Bill">বিজুলীৰ বিল (Electricity Bill)</option>
                            <option value="Miscellaneous Expenses">অন্যান্য খৰচ (Miscellaneous Expenses)</option>
                        </select>
                        <input type="number" id="expAmount" placeholder="টকাৰ পৰিমাণ (₹)" class="w-full p-3 border border-gray-200 rounded-xl text-sm focus:outline-none shadow-inner">
                        <input type="text" id="expDesc" placeholder="বিৱৰণ (Description)" class="w-full p-3 border border-gray-200 rounded-xl text-sm focus:outline-none shadow-inner">
                        <button id="btnSaveExpense" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow transition text-sm">খৰচ সংৰক্ষণ কৰক</button>
                    </div>
                </div>

                <div class="bg-white p-4 sm:p-5 rounded-2xl border border-gray-200 shadow-sm">
                    <h4 class="text-xs font-bold text-slate-900 uppercase tracking-wider border-b pb-1.5 flex items-center gap-1"><i class="fas fa-chart-pie text-slate-700"></i> ক্লিনিকৰ আয়-ব্যয় প্ৰতিবেদন</h4>
                    <div id="expenseSummaryText" class="text-xs space-y-1.5 text-gray-700">হিচাপ লোড হৈ আছে...</div>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                    <h4 class="text-xs font-bold text-slate-900 uppercase tracking-wider mb-3 flex items-center gap-1"><i class="fas fa-table text-emerald-600"></i> আয়-ব্যয়ৰ লাইভ বহী (Google Sheet View)</h4>
                    <div class="overflow-x-auto rounded-xl border border-gray-100 max-h-96">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr class="bg-slate-900 text-white font-bold uppercase tracking-wider sticky top-0">
                                    <th class="p-3 border-b border-slate-700">তাৰিখ</th>
                                    <th class="p-3 border-b border-slate-700">ধৰণ</th>
                                    <th class="p-3 border-b border-slate-700">শ্ৰেণী</th>
                                    <th class="p-3 border-b border-slate-700">বিৱৰণ</th>
                                    <th class="p-3 border-b border-slate-700 text-right">আয় (₹)</th>
                                    <th class="p-3 border-b border-slate-700 text-right">ব্যয় (₹)</th>
                                    <th class="p-3 border-b border-slate-700 text-center">কাৰ্য</th>
                                </tr>
                            </thead>
                            <tbody id="sheetTableBody" class="divide-y divide-gray-100 font-medium text-gray-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // আপোনাৰ আচল সুপাৰবেচ ক্ৰিডেন্সিয়েলচ (প্ৰকৃতিতে কোনো পৰিবৰ্তন কৰা হোৱা নাই)
        const SUPABASE_URL = "https://wexbntfscbbyfscvewex.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleGJudGZzY2JieWZzY3Zld2V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDkyMTU3NDYsImV4cCI6MjAyNTI5MTc0Nn0.Your_Actual_Token_Here";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let globalPatients = [];
        let isDoctor = false;

        document.addEventListener("DOMContentLoaded", () => {
            loadPatients();
            loadExpenses();
            setupTabs();

            document.getElementById('searchBar').addEventListener('input', filterPatients);
            document.getElementById('patientForm').addEventListener('submit', handleFormSubmit);
            document.getElementById('btnToggleAuth').addEventListener('click', toggleAuthForm);
            document.getElementById('btnVerifyPin').addEventListener('click', verifyDoctorPin);
            document.getElementById('btnCancelEdit').addEventListener('click', cancelEdit);
            document.getElementById('btnSaveExpense').addEventListener('click', saveExpense);
        });

        function toggleAuthForm() {
            document.getElementById('authForm').classList.toggle('hidden');
        }

        function verifyDoctorPin() {
            const pin = document.getElementById('doctorPin').value;
            if (pin === "2024" || pin === "365") { 
                isDoctor = true;
                document.getElementById('authStatusText').innerHTML = `<i class="fas fa-user-md text-emerald-600"></i> Doctor Mode Active`;
                document.getElementById('authStatusText').className = "text-xs font-bold text-emerald-800 flex items-center gap-1.5";
                document.getElementById('authForm').classList.add('hidden');
                document.getElementById('btnToggleAuth').classList.add('hidden');
                document.getElementById('doctorPin').value = '';
                renderPatients(globalPatients);
                loadExpenses();
            } else {
                alert("ভুল PIN!");
            }
        }

        async function loadPatients() {
            const { data, error } = await supabaseClient.from('clinic_data').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            globalPatients = data || [];
            renderPatients(globalPatients);
        }

        function renderPatients(patients) {
            const container = document.getElementById('patientList');
            if (patients.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-400 text-xs">কোনো তথ্য নাই।</div>';
                return;
            }

            container.innerHTML = patients.map(p => {
                const dateStr = new Date(p.created_at).toLocaleDateString();
                const nextDate = p.next_date ? new Date(p.next_date).toLocaleDateString() : 'নাই';
                
                return `
                <div class="bg-white p-4 rounded-2xl border border-gray-200/80 shadow-sm hover:shadow-md transition space-y-2.5 relative overflow-hidden">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-sm font-bold text-gray-900">${escapeHTML(p.name)}</h3>
                            <p class="text-[11px] text-gray-400 font-medium font-mono">${dateStr} | Age-Sex: ${escapeHTML(p.age_gender || 'N/A')}</p>
                        </div>
                        <span class="bg-slate-100 text-slate-800 text-[10px] font-bold px-2 py-0.5 rounded-full font-mono">₹${p.fees || 0}</span>
                    </div>
                    
                    <div class="text-xs space-y-1 text-gray-700 bg-slate-50/50 p-2.5 rounded-xl border border-gray-100">
                        <p><strong class="text-gray-500 text-[10px] uppercase tracking-wider block">লক্ষণ:</strong> ${escapeHTML(p.case_history || 'নাই')}</p>
                        <p class="pt-1.5 border-t border-gray-200/60 mt-1"><strong class="text-gray-500 text-[10px] uppercase tracking-wider block">ঔষধ:</strong> ${isDoctor ? escapeHTML(p.rx || 'নাই') : '<span class="text-gray-400 italic"><i class="fas fa-lock text-[9px]"></i> কেৱল ডাক্টৰৰ বাবে সংৰক্ষিত</span>'}</p>
                    </div>

                    <div class="flex justify-between items-center pt-1 text-[11px]">
                        <span class="text-gray-500 font-medium">Next Visit: <strong class="text-slate-800 font-mono">${nextDate}</strong></span>
                        <div class="flex gap-2">
                            ${p.phone ? `<button onclick="sendWhatsApp('${p.id}')" class="text-emerald-600 hover:text-emerald-700 p-1.5 bg-emerald-50 rounded-lg transition"><i class="fab fa-whatsapp text-sm"></i></button>` : ''}
                            ${isDoctor ? `
                                <button onclick="editPatient('${p.id}')" class="text-blue-600 hover:text-blue-700 p-1.5 bg-blue-50 rounded-lg transition"><i class="fas fa-edit text-xs"></i></button>
                                <button onclick="deletePatient('${p.id}')" class="text-red-500 hover:text-red-600 p-1.5 bg-red-50 rounded-lg transition"><i class="fas fa-trash text-xs"></i></button>
                            ` : ''}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function filterPatients() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = globalPatients.filter(p => p.name.toLowerCase().includes(query) || (p.phone && p.phone.includes(query)));
            renderPatients(filtered);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            
            const patientData = {
                name: document.getElementById('pName').value,
                phone: document.getElementById('pPhone').value,
                age_gender: document.getElementById('pAgeGender').value,
                address: document.getElementById('pAddress').value,
                case_history: document.getElementById('pCase').value,
                rx: document.getElementById('pRx').value,
                fees: parseFloat(document.getElementById('pFees').value) || 0,
                next_date: document.getElementById('pNextDate').value || null
            };

            if (id) {
                if (!isDoctor) return alert("অনুমতি নাই!");
                await supabaseClient.from('clinic_data').update(patientData).eq('id', id);
            } else {
                await supabaseClient.from('clinic_data').insert([patientData]);
            }

            document.getElementById('patientForm').reset();
            cancelEdit();
            await loadPatients();
            await loadExpenses();
            switchTab('home');
        }

        function editPatient(id) {
            const p = globalPatients.find(item => item.id === id);
            if (!p) return;

            document.getElementById('editId').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pPhone').value = p.phone || '';
            document.getElementById('pAgeGender').value = p.age_gender || '';
            document.getElementById('pAddress').value = p.address || '';
            document.getElementById('pCase').value = p.case_history || '';
            document.getElementById('pRx').value = p.rx || '';
            document.getElementById('pFees').value = p.fees || '';
            document.getElementById('pNextDate').value = p.next_date || '';

            document.getElementById('formTitle').innerHTML = `<i class="fas fa-edit text-blue-600"></i> ৰোগীৰ তথ্য সংশোধন`;
            document.getElementById('btnCancelEdit').classList.remove('hidden');
            switchTab('add');
        }

        function cancelEdit() {
            document.getElementById('editId').value = '';
            document.getElementById('patientForm').reset();
            document.getElementById('formTitle').innerHTML = `<i class="fas fa-id-card text-slate-700"></i> নতুন ৰোগী পঞ্জীয়ন ফৰ্ম`;
            document.getElementById('btnCancelEdit').classList.add('hidden');
        }

        async function deletePatient(id) {
            if (!isDoctor) return alert("অনুমতি নাই!");
            if (confirm("মচি পেলাব বিচাৰে নেকি?")) {
                await supabaseClient.from('clinic_data').delete().eq('id', id);
                await loadPatients();
                await loadExpenses();
            }
        }

        // 📊 লাইভ গুগল শ্বীট লেজাৰ লজিক (ৰোগীৰ ফীজ স্বয়ংক্ৰিয়ভাৱে যোগ হ’ব)
        async function loadExpenses() {
            const { data: expenses, error: expErr } = await supabaseClient.from('clinic_expenses').select('*').order('created_at', { ascending: false });
            const { data: patients, error: patErr } = await supabaseClient.from('clinic_data').select('*').order('created_at', { ascending: false });
            
            if (expErr || patErr) return console.log('Data fetch error');

            let totalIncome = 0;
            let totalExpense = 0;
            let fullLedger = [];

            // ১. ৰোগীৰ পৰা অহা ফীজ (INCOME) অটো যোগ কৰা
            if (patients) {
                patients.forEach(p => {
                    const fee = parseFloat(p.fees) || 0;
                    totalIncome += fee;
                    if (fee > 0) {
                        fullLedger.push({
                            id: p.id,
                            date: new Date(p.created_at).toLocaleDateString(),
                            rawDate: new Date(p.created_at),
                            type: 'INCOME',
                            category: 'Patient Fees',
                            description: `ৰোগী: ${p.name}`,
                            income: fee,
                            expense: 0,
                            canDelete: false
                        });
                    }
                });
            }

            // ২. দৈনিক খৰচসমূহ যোগ কৰা
            if (expenses) {
                expenses.forEach(e => {
                    const amt = parseFloat(e.amount) || 0;
                    totalExpense += amt;
                    fullLedger.push({
                        id: e.id,
                        date: new Date(e.created_at).toLocaleDateString(),
                        rawDate: new Date(e.created_at),
                        type: 'EXPENSE',
                        category: e.category,
                        description: e.description || 'বিৱৰণ নাই',
                        income: 0,
                        expense: amt,
                        canDelete: true
                    });
                });
            }

            fullLedger.sort((a, b) => b.rawDate - a.rawDate);

            let netProfit = totalIncome - totalExpense;
            const summaryText = document.getElementById('expenseSummaryText');
            if (summaryText) {
                summaryText.innerHTML = `
                <div class="grid grid-cols-3 gap-2 text-center font-bold mt-1">
                    <div class="bg-green-50 p-2 rounded-lg text-green-700 border border-green-200">মুঠ আয়<br><span class="text-sm font-mono">₹${totalIncome}</span></div>
                    <div class="bg-red-50 p-2 rounded-lg text-red-700 border border-red-200">মুঠ খৰচ<br><span class="text-sm font-mono">₹${totalExpense}</span></div>
                    <div class="bg-blue-50 p-2 rounded-lg text-blue-700 border border-blue-200">লাভ<br><span class="text-sm font-mono">₹${netProfit}</span></div>
                </div>
                `;
            }

            const tableBody = document.getElementById('sheetTableBody');
            if (!tableBody) return;

            if (fullLedger.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-gray-400">কোনো তথ্য নাই।</td></tr>';
                return;
            }

            tableBody.innerHTML = fullLedger.map(item => {
                const isIncome = item.type === 'INCOME';
                const typeBadge = isIncome 
                    ? '<span class="bg-green-100 text-green-800 px-1.5 py-0.5 rounded text-[10px] font-bold">আয়</span>' 
                    : '<span class="bg-red-100 text-red-800 px-1.5 py-0.5 rounded text-[10px] font-bold">ব্যয়</span>';
                
                return `
                <tr class="${isIncome ? 'hover:bg-green-50/40' : 'hover:bg-red-50/40'} transition-colors">
                    <td class="p-3 border-b border-gray-100 font-mono whitespace-nowrap">${item.date}</td>
                    <td class="p-3 border-b border-gray-100">${typeBadge}</td>
                    <td class="p-3 border-b border-gray-100 font-semibold">${escapeHTML(item.category)}</td>
                    <td class="p-3 border-b border-gray-100 max-w-xs truncate" title="${escapeHTML(item.description)}">${escapeHTML(item.description)}</td>
                    <td class="p-3 border-b border-gray-100 text-right font-bold text-green-600 font-mono">${item.income > 0 ? '₹' + item.income : '-'}</td>
                    <td class="p-3 border-b border-gray-100 text-right font-bold text-red-600 font-mono">${item.expense > 0 ? '₹' + item.expense : '-'}</td>
                    <td class="p-3 border-b border-gray-100 text-center">
                        ${item.canDelete && isDoctor ? `
                            <button onclick="deleteExpense('${item.id}')" class="text-red-500 hover:text-red-700 transition"><i class="fas fa-trash"></i></button>
                        ` : '<span class="text-gray-300">-</span>'}
                    </td>
                </tr>
                `;
            }).join('');
        }

        async function saveExpense() {
            if (!isDoctor) return alert("কেৱল ডাক্টৰ মোডতহে হ’ব!");
            const category = document.getElementById('expCategory').value;
            const amount = parseFloat(document.getElementById('expAmount').value) || 0;
            const description = document.getElementById('expDesc').value;

            if (amount <= 0) return alert("সঠিক পৰিমাণ দিয়ক।");

            const { error } = await supabaseClient.from('clinic_expenses').insert([{ category, amount, description }]);
            if (!error) {
                document.getElementById('expAmount').value = '';
                document.getElementById('expDesc').value = '';
                await loadExpenses();
            }
        }

        async function deleteExpense(id) {
            if (!isDoctor) return alert("অনুমতি নাই!");
            if (confirm("মচিব নিশ্চিতনে?")) {
                await supabaseClient.from('clinic_expenses').delete().eq('id', id);
                await loadExpenses();
            }
        }

        function sendWhatsApp(id) {
            const p = globalPatients.find(item => item.id === id);
            if (!p || !p.phone) return;

            const nextDate = p.next_date ? new Date(p.next_date).toLocaleDateString() : 'N/A';
            const msg = `👋 *নমস্কাৰ ${p.name}*, \n\n` +
                        `আপোনাৰ ৰেকৰ্ড সফলতাৰে আপডেইট কৰা হৈছে।\n\n` +
                        `💵 *ফীজ:* ₹${p.fees || 0}\n` +
                        `📅 *পৰৱৰ্তী তাৰিখ:* ${nextDate}\n\n` +
                        `যোগাযোগৰ বাবে ধন্যবাদ।\n\n` +
                        ` 📞 *হেল্পলাইন:* +919435661634\n` +
                        `কুশলে থাকক, \n*DR. HARIS CLINIC*`;
            window.open(`https://api.whatsapp.com/send?phone=91${p.phone.replace(/\D/g, '')}&text=${encodeURIComponent(msg)}`, '_blank');
        }

        function setupTabs() {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetTab = btn.getAttribute('data-tab');
                    document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
                    document.getElementById(`tab-${targetTab}`)?.classList.remove('hidden');
                    buttons.forEach(b => {
                        b.classList.remove('text-slate-900', 'border-b-2', 'border-slate-900');
                        b.classList.add('text-gray-400');
                    });
                    btn.classList.add('text-slate-900', 'border-b-2', 'border-slate-900');
                    btn.classList.remove('text-gray-400');
                });
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`)?.classList.remove('hidden');
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => {
                if (b.getAttribute('data-tab') === tabId) {
                    b.classList.add('text-slate-900', 'border-b-2', 'border-slate-900');
                    b.classList.remove('text-gray-400');
                } else {
                    b.classList.remove('text-slate-900', 'border-b-2', 'border-slate-900');
                    b.classList.add('text-gray-400');
                }
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
