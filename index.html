<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Smart Clinic</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #075E54; --secondary: #128C7E; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .header { background: var(--primary); color: white; text-align: center; padding: 15px; border-radius: 0 0 20px 20px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 4px solid var(--secondary); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { background: var(--secondary); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .wa-btn { background: #25D366; color: white; padding: 10px 15px; text-decoration: none; border-radius: 6px; font-size: 14px; display: inline-block; margin-top: 10px; font-weight: bold; text-align: center; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 5px 0; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #fff; cursor: pointer; border-radius: 10px; font-weight: bold; color: #555; }
        .active-tab { background: var(--primary); color: white; }
        .patient-card { border-left: 5px solid var(--secondary); margin-top: 10px; padding-left: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .summary-box { display: flex; justify-content: space-between; text-align: center; }
        .income { color: #28a745; } .expense { color: #dc3545; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">Dr. Haris Homeopathic & Physiotherapy</h2>
    <p style="margin:5px 0 0 0; font-size: 12px; opacity: 0.8;">Professional Clinic Management System</p>
</div>

<div style="max-width: 600px; margin: auto;">
    
    <div class="tabs">
        <button id="btn-patients" class="tab-btn active-tab" onclick="showTab('patients')">ৰোগীৰ তথ্য</button>
        <button id="btn-accounts" class="tab-btn" onclick="showTab('accounts')">হিচাপ-পত্ৰ</button>
    </div>

    <div id="tab-patients">
        <div class="card">
            <h3 style="margin-top:0; color:var(--primary);">ৰোগী এন্ট্ৰি</h3>
            <input type="text" id="pName" placeholder="ৰোগীৰ সম্পূৰ্ণ নাম">
            <input type="text" id="pAge" placeholder="বয়স আৰু লিংগ (যেনে: 50/Female)">
            <input type="text" id="pBP" placeholder="BP (যেনে: 120/80)">
            <textarea id="pHistory" rows="2" placeholder="ৰোগীৰ ইতিহাস (History)"></textarea>
            <textarea id="pMedicine" rows="3" placeholder="প্ৰেছক্ৰিপশ্যন (Prescription)"></textarea>
            <input type="number" id="pFees" placeholder="Fees (কেৱল ক্লিনিৰ ৰেকৰ্ডৰ বাবে)">
            <button class="btn" onclick="addPatient()">Save & Sync Data</button>
        </div>
        <div id="patientList"></div>
    </div>

    <div id="tab-accounts" style="display:none;">
        <div class="card">
            <h3 style="margin-top:0; color:var(--primary);">দৈনিক লেনদেন</h3>
            <select id="accType">
                <option value="Income">Income (উপাৰ্জন)</option>
                <option value="Expense">Expense (খৰচ)</option>
            </select>
            <input type="number" id="accAmount" placeholder="টকাৰ পৰিমাণ">
            <input type="text" id="accNote" placeholder="বিৱৰণ (যেনে: ৰোগীৰ ফীজ, ঔষধ)">
            <button class="btn" onclick="addAccount()" style="background:#000;">Entry কৰক</button>
        </div>
        <div id="accountSummary" class="card"></div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://oblvgjnyecvvnnnesegl.supabase.co';
    const supabaseKey = 'sb_publishable_ekuwTZtgiCXsGRBWJXqYzQ_T8xUYjF9';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const socialMediaLinks = `
🔗 *Follow Us For Health Updates:*
📺 YouTube: https://www.youtube.com/@drhari
🔵 Facebook: https://www.facebook.com/drhari365
📸 Instagram: https://www.instagram.com/drharikanta/
🌐 Website: https://drhariswellfuture.com/`;

    function showTab(tab) {
        document.getElementById('tab-patients').style.display = tab === 'patients' ? 'block' : 'none';
        document.getElementById('tab-accounts').style.display = tab === 'accounts' ? 'block' : 'none';
        document.getElementById('btn-patients').classList.toggle('active-tab', tab === 'patients');
        document.getElementById('btn-accounts').classList.toggle('active-tab', tab === 'accounts');
        if(tab === 'accounts') loadAccounts();
    }

    async function addPatient() {
        const name = document.getElementById('pName').value;
        if(!name) return alert("নাম প্ৰয়োজনীয়!");
        
        const patientData = {
            name: name,
            age: document.getElementById('pAge').value,
            bp: document.getElementById('pBP').value,
            history: document.getElementById('pHistory').value,
            medicine: document.getElementById('pMedicine').value,
            fees: parseInt(document.getElementById('pFees').value) || 0
        };

        const { error } = await _supabase.from('clinic_data').insert([patientData]);
        if(!error) {
            if(patientData.fees > 0) {
                await _supabase.from('clinic_accounts').insert([{type: 'Income', amount: patientData.fees, note: 'Fee: ' + name}]);
            }
            alert("Success!");
            location.reload();
        }
    }

    async function loadPatients() {
        const { data } = await _supabase.from('clinic_data').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('patientList');
        list.innerHTML = "<h3>Patient Records:</h3>";
        
        data.forEach(p => {
            const waMsg = `*Dr. Haris Homeopathic & Physiotherapy*\n--------------------\n*Patient:* ${p.name}\n*Age/Sex:* ${p.age}\n*BP:* ${p.bp}\n*History:* ${p.history}\n\n*Prescription (Rx):*\n${p.medicine}\n--------------------\n${socialMediaLinks}\n\n*Get Well Soon.*`;
            const waLink = `https://wa.me/?text=${encodeURIComponent(waMsg)}`;
            
            list.innerHTML += `
                <div class="card">
                    <strong>${p.name}</strong> (${p.age})
                    <div class="patient-card">
                        <small>BP: ${p.bp || 'N/A'} | History: ${p.history || 'N/A'}</small>
                        <p style="margin:5px 0; color:#333;"><strong>Rx:</strong> ${p.medicine}</p>
                        <p style="margin:0; font-weight:bold; color:red;">Fee Record: ₹${p.fees}</p>
                    </div>
                    <a href="${waLink}" target="_blank" class="wa-btn">Send Report via WhatsApp</a>
                </div>`;
        });
    }

    async function addAccount() {
        const amt = document.getElementById('accAmount').value;
        if(!amt) return;
        await _supabase.from('clinic_accounts').insert([{
            type: document.getElementById('accType').value,
            amount: parseInt(amt),
            note: document.getElementById('accNote').value
        }]);
        loadAccounts();
    }

    async function loadAccounts() {
        const { data } = await _supabase.from('clinic_accounts').select('*').order('created_at', { ascending: false });
        let inc = 0, exp = 0;
        data.forEach(d => d.type === 'Income' ? inc += d.amount : exp += d.amount);
        document.getElementById('accountSummary').innerHTML = `
            <div class="summary-box">
                <div class="income"><h4>উপাৰ্জন</h4>₹${inc}</div>
                <div class="expense"><h4>খৰচ</h4>₹${exp}</div>
                <div><h4>লাভ</h4>₹${inc - exp}</div>
            </div>`;
    }

    window.onload = loadPatients;
</script>
</body>
</html>
