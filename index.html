<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Smart Clinic & Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-2 sm:p-6 pb-20">
    <div class="max-w-2xl mx-auto">
        <header class="bg-slate-800 text-white p-6 rounded-2xl shadow-lg mb-6 text-center">
            <h1 class="text-3xl font-bold">DR. HARI'S CLINIC</h1>
            <p class="opacity-75">Patient Records & Expense Management</p>
        </header>

        <div class="flex mb-6 bg-white rounded-xl shadow-sm p-1 border">
            <button onclick="showTab('patients')" id="tabPat" class="flex-1 py-2 px-4 rounded-lg font-bold text-indigo-700 bg-indigo-50">ৰোগীৰ তথ্য</button>
            <button onclick="showTab('expenses')" id="tabExp" class="flex-1 py-2 px-4 rounded-lg font-bold text-gray-500">খৰচৰ খতিয়ান</button>
        </div>

        <div id="patientsSection" class="block">
            <div class="bg-white p-6 rounded-2xl shadow-md mb-6 border-t-4 border-indigo-600">
                <h2 class="text-lg font-bold mb-4 flex items-center">নতুন ৰোগী যোগ কৰক</h2>
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="pName" placeholder="ৰোগীৰ নাম" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">
                    <textarea id="pHistory" placeholder="বেমাৰৰ ইতিহাস (History)" class="border p-3 rounded-lg h-20 outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
                    <input type="text" id="pMed" placeholder="দৰৱৰ নাম (Medicine)" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">
                    <input type="number" id="pFee" placeholder="মাচুল (₹)" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">
                    <button onclick="addEntry()" class="bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">Patient Entry কৰক</button>
                </div>
            </div>
        </div>

        <div id="expensesSection" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-md mb-6 border-t-4 border-red-500">
                <h2 class="text-lg font-bold mb-4">ক্লিনিকৰ খৰচ (Salary, Bill, Rent etc.)</h2>
                <div class="grid grid-cols-1 gap-3">
                    <select id="eCategory" class="border p-3 rounded-lg outline-none">
                        <option value="দৰমহা (Salary)">দৰমহা (Salary)</option>
                        <option value="বিজুলী বিল (Light Bill)">বিজুলী বিল (Light Bill)</option>
                        <option value="ঘৰ ভাৰা (Rent)">ঘৰ ভাৰা (Rent)</option>
                        <option value="গ্যাছ বিল (Gas Bill)">গ্যাছ বিল (Gas Bill)</option>
                        <option value="অন্যান্য (Others)">অন্যান্য (Others)</option>
                    </select>
                    <input type="number" id="eAmount" placeholder="খৰচৰ পৰিমাণ (₹)" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-red-400">
                    <input type="text" id="eNote" placeholder="টোকা (Note)" class="border p-3 rounded-lg outline-none focus:ring-2 focus:ring-red-400">
                    <button onclick="addExpense()" class="bg-red-500 text-white font-bold py-3 rounded-xl hover:bg-red-600 transition">খৰচ যোগ কৰক</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
            <div class="bg-green-100 p-4 rounded-xl border border-green-200">
                <p class="text-xs text-green-700 font-bold uppercase">উপাৰ্জন (মাহেকীয়া)</p>
                <p id="monthlyIncome" class="text-xl font-black text-green-800">₹ 0</p>
            </div>
            <div class="bg-red-100 p-4 rounded-xl border border-red-200">
                <p class="text-xs text-red-700 font-bold uppercase">খৰচ (মাহেকীয়া)</p>
                <p id="monthlyExp" class="text-xl font-black text-red-800">₹ 0</p>
            </div>
            <div class="bg-blue-100 p-4 rounded-xl border border-blue-200">
                <p class="text-xs text-blue-700 font-bold uppercase">নিট লাভ (Profit)</p>
                <p id="netProfit" class="text-xl font-black text-blue-800">₹ 0</p>
            </div>
        </div>

        <div id="mainDisplayList" class="space-y-4">
            </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('dr_hari_db')) || [];
        let expenses = JSON.parse(localStorage.getItem('dr_hari_exp')) || [];
        let currentTab = 'patients';

        function showTab(tab) {
            currentTab = tab;
            document.getElementById('patientsSection').className = tab === 'patients' ? 'block' : 'hidden';
            document.getElementById('expensesSection').className = tab === 'expenses' ? 'block' : 'hidden';
            
            // Tab styling
            document.getElementById('tabPat').className = `flex-1 py-2 px-4 rounded-lg font-bold ${tab === 'patients' ? 'text-indigo-700 bg-indigo-50 shadow-sm' : 'text-gray-500'}`;
            document.getElementById('tabExp').className = `flex-1 py-2 px-4 rounded-lg font-bold ${tab === 'expenses' ? 'text-red-700 bg-red-50 shadow-sm' : 'text-gray-500'}`;
            
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('mainDisplayList');
            list.innerHTML = '';
            let totalIncome = 0;
            let totalExp = 0;
            const currentMonth = new Date().getMonth();

            // Calculate Income
            records.forEach((r, i) => {
                const recDate = new Date(r.timestamp);
                if(recDate.getMonth() === currentMonth) totalIncome += parseInt(r.fee);
                if(currentTab === 'patients') {
                    list.innerHTML += `<div class="bg-white p-5 rounded-2xl shadow border-l-8 border-indigo-500 relative">
                        <h3 class="font-bold text-gray-800">${r.name} <span class="text-xs font-normal text-gray-400 ml-2">${r.date}</span></h3>
                        <p class="text-sm text-red-600 mt-1"><strong>History:</strong> ${r.history}</p>
                        <p class="text-sm text-green-700"><strong>Medicine:</strong> ${r.medicine}</p>
                        <p class="mt-2 font-bold text-indigo-700">₹${r.fee}</p>
                        <button onclick="deleteItem('patients', ${i})" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 text-xs">Delete</button>
                    </div>`;
                }
            });

            // Calculate Expenses
            expenses.forEach((e, i) => {
                const expDate = new Date(e.timestamp);
                if(expDate.getMonth() === currentMonth) totalExp += parseInt(e.amount);
                if(currentTab === 'expenses') {
                    list.innerHTML += `<div class="bg-white p-5 rounded-2xl shadow border-l-8 border-red-500 relative">
                        <h3 class="font-bold text-gray-800">${e.category}</h3>
                        <p class="text-sm text-gray-500">${e.note || ''}</p>
                        <p class="text-xs text-gray-400">${e.date}</p>
                        <p class="mt-2 font-bold text-red-600">₹${e.amount}</p>
                        <button onclick="deleteItem('expenses', ${i})" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 text-xs">Delete</button>
                    </div>`;
                }
            });

            document.getElementById('monthlyIncome').innerText = '₹ ' + totalIncome;
            document.getElementById('monthlyExp').innerText = '₹ ' + totalExp;
            document.getElementById('netProfit').innerText = '₹ ' + (totalIncome - totalExp);
            
            localStorage.setItem('dr_hari_db', JSON.stringify(records));
            localStorage.setItem('dr_hari_exp', JSON.stringify(expenses));
        }

        function addEntry() {
            const name = document.getElementById('pName').value;
            const history = document.getElementById('pHistory').value;
            const medicine = document.getElementById('pMed').value;
            const fee = document.getElementById('pFee').value;
            if(!name || !fee) return alert('নাম আৰু মাচুল দিয়ক');
            records.unshift({ name, history, medicine, fee, date: new Date().toLocaleDateString('as-IN'), timestamp: new Date().getTime() });
            document.getElementById('pName').value = ''; document.getElementById('pHistory').value = ''; document.getElementById('pMed').value = ''; document.getElementById('pFee').value = '';
            updateUI();
        }

        function addExpense() {
            const amount = document.getElementById('eAmount').value;
            const category = document.getElementById('eCategory').value;
            const note = document.getElementById('eNote').value;
            if(!amount) return alert('পৰিমাণ দিয়ক');
            expenses.unshift({ amount, category, note, date: new Date().toLocaleDateString('as-IN'), timestamp: new Date().getTime() });
            document.getElementById('eAmount').value = ''; document.getElementById('eNote').value = '';
            updateUI();
        }

        function deleteItem(type, i) {
            if(!confirm('মচি দিব খুজিছে নেকি?')) return;
            if(type === 'patients') records.splice(i, 1);
            else expenses.splice(i, 1);
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
