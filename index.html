<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Clinic</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .premium-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>

<body class="bg-slate-100 text-gray-800 antialiased min-h-screen py-4 sm:py-8 px-2">

<!-- MAIN PATIENT SECTION -->
<div id="mainPatientSection" class="w-full max-w-md mx-auto glass-card shadow-2xl rounded-3xl p-5 sm:p-6 border border-white/40">

    <!-- HEADER -->
    <div class="text-center flex flex-col items-center mt-2">
        <div class="relative mb-4">
            <div class="w-28 h-28 rounded-full border-4 border-slate-900 overflow-hidden bg-slate-100">
                <img src="doctor.jpg.jpeg" class="w-full h-full object-cover">
            </div>
            <div class="absolute -bottom-1 right-2 bg-emerald-500 w-5 h-5 rounded-full border-4 border-white animate-pulse"></div>
        </div>

        <h2 class="text-3xl font-extrabold text-slate-900">Dr. Haris Clinic</h2>
        <p class="text-xs text-gray-500 font-medium mt-1">
            Homeopathic Physician & Physiotherapist
        </p>

        <div class="w-12 h-1 bg-slate-900 rounded-full mt-2"></div>
    </div>

    <!-- BOOKING FORM -->
    <div id="bookingStep1" class="bg-slate-50 p-5 rounded-2xl mt-5 space-y-4 border">

        <h3 class="text-xs font-bold text-center text-slate-500 uppercase">
            Online Booking Form
        </h3>

        <!-- TYPE -->
        <div class="flex gap-2 bg-slate-200 p-1 rounded-xl">
            <button id="btnSelectRegular" class="w-1/2 bg-slate-900 text-white py-2 rounded-lg text-xs font-bold">
                Regular
            </button>
            <button id="btnSelectOnline" class="w-1/2 text-gray-600 py-2 rounded-lg text-xs font-bold">
                Online
            </button>
        </div>

        <!-- INPUTS -->
        <input id="bName" class="w-full p-3 rounded-xl border" placeholder="ৰোগীৰ নাম">
        <input id="bPhone" class="w-full p-3 rounded-xl border" placeholder="ম'বাইল নম্বৰ">
        <textarea id="bProblem" class="w-full p-3 rounded-xl border h-20" placeholder="সমস্যা লিখক"></textarea>

        <button id="btnProceedToPay" class="w-full premium-gradient text-white py-3 rounded-xl font-bold">
            আগবাঢ়ক →
        </button>
    </div>

    <!-- PAYMENT STEP -->
    <div id="bookingStep2" class="hidden bg-slate-50 p-5 rounded-2xl mt-5 border">

        <button id="btnBackToStep1" class="text-xs text-gray-500 mb-2">← Back</button>

        <h3 class="text-sm font-bold text-center text-emerald-700 mb-3">
            Payment Verify
        </h3>

        <img id="paymentQRCode" class="w-40 h-40 mx-auto">

        <input id="bTxnId" class="w-full p-3 border rounded-xl mt-3 text-center font-mono" placeholder="Transaction ID">

        <button id="btnSubmitBooking" class="w-full bg-emerald-600 text-white py-3 rounded-xl mt-3 font-bold">
            Confirm Booking
        </button>
    </div>

</div>

<!-- DASHBOARD -->
<div id="appDashboard" class="hidden min-h-screen bg-slate-50">

    <div class="bg-white p-4 flex justify-between shadow">
        <h2 class="font-bold">DR. HARIS CLINIC</h2>
        <button id="btnLogout" class="text-red-500 text-xs">Logout</button>
    </div>

    <div class="p-4">

        <input id="searchBox" class="w-full p-3 border rounded-xl" placeholder="Search patient">

        <button id="btnScrollToEntry" class="w-full mt-3 bg-black text-white py-3 rounded-xl">
            New Patient
        </button>

        <div id="listPatients" class="mt-4 space-y-3"></div>
    </div>

</div>

<div id="printArea" class="hidden"></div>

<script>
const SUPABASE_URL = 'https://oblvgjnyecvvnnnesegl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_ekuwTZtgiCXsGRBWJXqT8xUYjF9';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selectedBookingType = 'Regular Appointment';
let currentFee = 100;

function safeGet(id){ return document.getElementById(id) || {value:''}; }

document.addEventListener('DOMContentLoaded', ()=>{

    document.getElementById('btnSelectRegular').onclick = ()=>{
        selectedBookingType='Regular Appointment';
        currentFee=100;
    };

    document.getElementById('btnSelectOnline').onclick = ()=>{
        selectedBookingType='Online Consultation';
        currentFee=250;
    };

    document.getElementById('btnProceedToPay').onclick = ()=>{
        const name = safeGet('bName').value.trim();
        const phone = safeGet('bPhone').value.trim();
        if(!name || !phone) return alert('Name & phone required');

        const upi = `upi://pay?pa=9954340102@okbizaxis&am=${currentFee}&cu=INR`;
        document.getElementById('paymentQRCode').src =
        `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(upi)}`;

        bookingStep1.classList.add('hidden');
        bookingStep2.classList.remove('hidden');
    };

    document.getElementById('btnBackToStep1').onclick = ()=>{
        bookingStep2.classList.add('hidden');
        bookingStep1.classList.remove('hidden');
    };

});
</script>

</body>
</html>
