<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Haris Clinic | Smart Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #004d40; 
            --accent: #00c853; 
            --light: #f8fafb; 
            --white: #ffffff;
            --text: #2c3e50;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--light); 
            margin: 0; 
            padding-bottom: 90px; 
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .header { 
            background: linear-gradient(135deg, var(--primary), #00695c); 
            color: white; 
            padding: 40px 20px 60px; 
            text-align: center; 
            border-radius: 0 0 35px 35px;
            box-shadow: 0 4px 20px rgba(0,77,64,0.3);
        }

        .card { 
            background: var(--white); 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: var(--shadow); 
            margin: 15px; 
            border: 1px solid rgba(0,0,0,0.03);
        }

        input, textarea, select { 
            width: 100%; 
            padding: 15px; 
            margin: 8px 0; 
            border-radius: 12px; 
            border: 1px solid #e0e0e0; 
            box-sizing: border-box; 
            background: #fdfdfd;
            font-size: 15px;
        }

        .btn-primary { 
            background: var(--primary); 
            color: white; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            padding: 16px; 
            border-radius: 12px;
            width: 100%;
            font-size: 16px;
        }

        /* Bottom Nav Fix */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            flex: 1;
            cursor: pointer;
        }

        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }

        /* Prescription Item Buttons */
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }

        .action-btns button {
            padding: 10px 5px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body>

<div id="loginArea" class="card no-print" style="max-width: 400px; margin: 80px auto; text-align:center;">
    <h2 style="color: var(--primary);">Dr. Haris Clinic</h2>
    <input type="password" id="adminPass" placeholder="পাছৱৰ্ড দিয়ক">
    <button class="btn-primary" onclick="checkPass()">LOGIN</button>
</div>

<div id="mainApp" style="display:none;">
    <div class="header no-print">
        <h1>Dr. Haris Clinic</h1>
    </div>

    <div id="section-home" class="tab-content">
        <div class="card" style="margin-top: -25px;">
            <input type="text" id="searchBox" placeholder="🔍 নাম বা নম্বৰ দি বিচাৰক..." onkeyup="filterPatients()">
        </div>
        <div id="listPatients"></div>
    </div>

    <div id="section-newrx" class="tab-content" style="display:none;">
        <div class="card">
            <h3 id="formTitle" style="color: var(--primary); margin-top:0;">New Entry</h3>
            <input type="text" id="pName" placeholder="ৰোগীৰ নাম">
            <div style="display:flex; gap:10px;">
                <input type="text" id="pAgeSex" placeholder="বয়স/লিংগ">
                <input type="text" id="pBP" placeholder="BP">
            </div>
            <input type="text" id="pPhone" placeholder="মোবাইল নম্বৰ">
            <textarea id="pHistory" placeholder="Patient History" style="height: 80px;"></textarea>
            <textarea id="pMedicine" placeholder="Rx (ঔষধসমূহ)" style="height: 120px;"></textarea>
            <input type="number" id="pFees" placeholder="Fees (₹)">
            <button class="btn-primary" id="saveBtn" onclick="addPatient()">SAVE Rx</button>
            <button class="btn-primary" style="background:#95a5a6; margin-top:10px;" onclick="clearForm()">CANCEL / NEW</button>
        </div>
    </div>

    <div id="section-bookings" class="tab-content" style="display:none;">
        <div class="card"><h3>Bookings</h3><div id="listBookings"></div></div>
    </div>

    <div id="section-reports" class="tab-content" style="display:none;">
        <div class="card" style="display:flex; justify-content:space-between; background:var(--primary); color:white;">
            <div>উপাৰ্জন: <b id="totalInc">0</b></div>
            <div>খৰচ: <b id="totalExp">0</b></div>
        </div>
        <div class="card">
            <input type="number" id="accAmount" placeholder="Amount (₹)">
            <input type="text" id="accNote" placeholder="Note">
            <button class="btn-primary" onclick="addAccount('Expense')">SAVE EXPENSE</button>
        </div>
    </div>

    <div class="bottom-nav no-print">
        <a class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-search"></i><span>Search</span></a>
        <a class="nav-item" onclick="showTab('newrx', this)"><i class="fas fa-plus-circle" style="color:var(--accent); font-size:24px;"></i><span>New Rx</span></a>
        <a class="nav-item" onclick="showTab('bookings', this)"><i class="fas fa-calendar"></i><span>Bookings</span></a>
        <a class="nav-item" onclick="showTab('reports', this)"><i class="fas fa-wallet"></i><span>Accounts</span></a>
    </div>
</div>

<div id="printArea" class="print-only"></div>

<script>
    const supabaseUrl = 'https://oblvgjnyecvvnnnesegl.supabase.co';
    const supabaseKey = 'sb_publishable_ekuwTZtgiCXsGRBWJXqYzQ_T8xUYjF9';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    let currentEditPatientId = null;

    function checkPass() {
        if(document.getElementById('adminPass').value === 'drharis1') {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadPatients(); loadAccounts(); loadBookings();
        } else { alert("ভুল!"); }
    }

    function showTab(tabName, el) {
        document.querySelectorAll('.tab-content').forEach(d => d.style.display = 'none');
        document.getElementById('section-' + tabName).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    async function addPatient() {
        const name = document.getElementById('pName').value;
        if(!name) return alert("নাম লাগে!");
        const d = { 
            name, age: document.getElementById('pAgeSex').value, 
            bp: document.getElementById('pBP').value, phone: document.getElementById('pPhone').value,
            history: document.getElementById('pHistory').value, medicine: document.getElementById('pMedicine').value,
            fees: parseInt(document.getElementById('pFees').value) || 0
        };

        const { error } = currentEditPatientId ? 
            await _supabase.from('clinic_data').update(d).eq('id', currentEditPatientId) :
            await _supabase.from('clinic_data').insert([d]);

        if(!error) { alert("Done!"); location.reload(); }
    }

    async function loadPatients() {
        const { data } = await _supabase.from('clinic_data').select('*').order('created_at', { ascending: false });
        if(data) document.getElementById('listPatients').innerHTML = data.map(p => `
            <div class="card">
                <b>${p.name}</b><br><small>${p.phone || ''}</small>
                <div class="action-btns">
                    <button onclick='printPrescription(${JSON.stringify(p)})' style="background:#eee;"><i class="fas fa-print"></i> Print</button>
                    <button onclick='sendWhatsApp(${JSON.stringify(p)})' style="background:#25d366; color:white;"><i class="fab fa-whatsapp"></i> WA</button>
                    <button onclick='editPatient(${JSON.stringify(p)})' style="background:#3498db; color:white;"><i class="fas fa-edit"></i> Edit</button>
                </div>
            </div>`).join('');
    }

    function editPatient(p) {
        currentEditPatientId = p.id;
        document.getElementById('pName').value = p.name;
        document.getElementById('pAgeSex').value = p.age || '';
        document.getElementById('pBP').value = p.bp || '';
        document.getElementById('pPhone').value = p.phone || '';
        document.getElementById('pHistory').value = p.history || '';
        document.getElementById('pMedicine').value = p.medicine;
        document.getElementById('pFees').value = p.fees || '';
        
        document.getElementById('formTitle').innerText = "Edit: " + p.name;
        document.getElementById('saveBtn').innerText = "UPDATE";
        
        showTab('newrx', document.querySelectorAll('.nav-item')[1]);
    }

    function clearForm() {
        currentEditPatientId = null;
        document.getElementById('pName').value = '';
        document.getElementById('pMedicine').value = '';
        document.getElementById('formTitle').innerText = "New Entry";
        document.getElementById('saveBtn').innerText = "SAVE Rx";
        showTab('home', document.querySelectorAll('.nav-item')[0]);
    }

    async function loadBookings() {
        const { data } = await _supabase.from('clinic_bookings').select('*').order('created_at', { ascending: false });
        if(data) document.getElementById('listBookings').innerHTML = data.map(b => `<div style="padding:10px; border-bottom:1px solid #eee;">${b.name}</div>`).join('');
    }

    async function loadAccounts() {
        const { data } = await _supabase.from('clinic_accounts').select('*');
        if(data) {
            let i=0, e=0; data.forEach(d => d.type==='Income'?i+=d.amount:e+=d.amount);
            document.getElementById('totalInc').innerText = '₹'+i;
            document.getElementById('totalExp').innerText = '₹'+e;
        }
    }

    async function addAccount(type) {
        const amt = parseInt(document.getElementById('accAmount').value);
        if(!amt) return;
        await _supabase.from('clinic_accounts').insert([{ type, amount: amt, note: document.getElementById('accNote').value }]);
        location.reload();
    }

    function filterPatients() {
        const term = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('#listPatients .card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    }

    function printPrescription(p) {
        document.getElementById('printArea').innerHTML = `<div style="padding:30px;"><h2>DR. HARIS CLINIC</h2><hr><p>Name: ${p.name}</p><p>Rx:<br>${p.medicine.replace(/\n/g, '<br>')}</p></div>`;
        window.print();
    }

    function sendWhatsApp(p) {
        window.open(`https://wa.me/91${p.phone}?text=Rx: ${encodeURIComponent(p.medicine)}`);
    }
</script>
</body>
</html>
